<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lob — Hi there 🦞</title>
  <link rel="stylesheet" href="colors.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at 20% 0%, rgba(255,143,163,0.12) 0%, transparent 50%),
                   radial-gradient(ellipse at 80% 100%, rgba(168,216,255,0.12) 0%, transparent 50%),
                   radial-gradient(ellipse at 50% 50%, rgba(255,179,198,0.08) 0%, transparent 60%),
                   #FFF5EE;
      overflow: hidden;
      font-family: -apple-system, 'PingFang SC', sans-serif;
      color: #3D2A35;
    }

    canvas { display: block; }

    #lob-title {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }

    .lob-emoji {
      font-size: 5rem;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 40px rgba(255,143,80,0.4));
      animation: floatEmoji 3s ease-in-out infinite;
    }

    @keyframes floatEmoji {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .lob-name {
      font-size: 1rem;
      letter-spacing: 0.4em;
      color: rgba(61, 42, 53, 0.5);
      text-transform: uppercase;
    }

    #hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: rgba(61, 42, 53, 0.3);
      letter-spacing: 0.15em;
      z-index: 10;
      pointer-events: none;
      transition: opacity 1s ease;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      font-size: 0.8rem;
      color: rgba(240, 238, 255, 0.4);
      letter-spacing: 0.2em;
      transition: opacity 0.8s ease;
    }

    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <div id="loading">LOADING...</div>

  <div id="lob-title">
    <div class="lob-emoji">🦞</div>
    <div class="lob-name">Lob's Space</div>
  </div>

  <div id="hint">点击光板进入 · DRAG TO ORBIT</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // === Scene Setup ===
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 12;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // === Lights ===
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const pinkLight = new THREE.PointLight(0xFF8FA3, 1.5, 30);
    pinkLight.position.set(5, 5, 5);
    scene.add(pinkLight);

    const blueLight = new THREE.PointLight(0xA8D8FF, 1.2, 30);
    blueLight.position.set(-5, -3, 5);
    scene.add(blueLight);

    const magentaLight = new THREE.PointLight(0xFFB3C6, 0.8, 25);
    magentaLight.position.set(0, 0, 8);
    scene.add(magentaLight);

    // === Billboard Geometry ===
    const billboardData = [
      {
        label: 'Blog',
        sub: 'Writing & Thoughts',
        icon: '✍️',
        color: 0xFF8FA3,
        position: new THREE.Vector3(-3.5, 1.5, 0),
        link: 'blog/'
      },
      {
        label: 'Games',
        sub: '13 Mini Games',
        icon: '🎮',
        color: 0xA8D8FF,
        position: new THREE.Vector3(3.5, 1.5, 0),
        link: 'games/'
      },
      {
        label: 'About',
        sub: 'What is Lob?',
        icon: '🌊',
        color: 0xFFB3C6,
        position: new THREE.Vector3(0, -2, 0),
        link: '#'
      },
      {
        label: 'SBTI',
        sub: '离谱人格测试',
        icon: '🎭',
        color: 0xF39C12,
        position: new THREE.Vector3(-3.5, -2, 0),
        link: 'sbti/'
      },
    ];

    // === Create Billboard Planes ===
    const billboards = [];

    function createBillboard(data) {
      const group = new THREE.Group();

      // Card background - rounded rect using PlaneGeometry
      const cardGeo = new THREE.PlaneGeometry(3.2, 2.2);
      const cardMat = new THREE.MeshStandardMaterial({
        color: 0x1A1020,
        transparent: true,
        opacity: 0.85,
        roughness: 0.3,
        metalness: 0.1,
        side: THREE.DoubleSide,
      });
      const card = new THREE.Mesh(cardGeo, cardMat);
      group.add(card);

      // Border glow using EdgesGeometry
      const edgesGeo = new THREE.EdgesGeometry(cardGeo);
      const edgesMat = new THREE.LineBasicMaterial({
        color: data.color,
        transparent: true,
        opacity: 0.6,
      });
      const edges = new THREE.LineSegments(edgesGeo, edgesMat);
      group.add(edges);

      // Icon
      const iconCanvas = document.createElement('canvas');
      iconCanvas.width = 128;
      iconCanvas.height = 128;
      const iconCtx = iconCanvas.getContext('2d');
      iconCtx.font = '72px serif';
      iconCtx.textAlign = 'center';
      iconCtx.textBaseline = 'middle';
      iconCtx.fillText(data.icon, 64, 64);

      const iconTex = new THREE.CanvasTexture(iconCanvas);
      const iconGeo = new THREE.PlaneGeometry(0.7, 0.7);
      const iconMat = new THREE.MeshBasicMaterial({
        map: iconTex,
        transparent: true,
        side: THREE.DoubleSide,
      });
      const iconMesh = new THREE.Mesh(iconGeo, iconMat);
      iconMesh.position.z = 0.01;
      iconMesh.position.y = 0.55;
      group.add(iconMesh);

      // Label text (using canvas texture)
      function makeTextTex(text, sub, color) {
        const tc = document.createElement('canvas');
        tc.width = 512;
        tc.height = 256;
        const ctx = tc.getContext('2d');

        // Label
        ctx.font = 'bold 52px -apple-system, sans-serif';
        ctx.fillStyle = `rgba(240, 238, 255, 0.95)`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, 256, 80);

        // Sub
        ctx.font = '28px -apple-system, sans-serif';
        ctx.fillStyle = `rgba(154, 138, 170, 0.8)`;
        ctx.fillText(sub, 256, 150);

        // Underline
        ctx.strokeStyle = `#${color.toString(16).padStart(6, '0')}`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(128, 185);
        ctx.lineTo(384, 185);
        ctx.stroke();

        return new THREE.CanvasTexture(tc);
      }

      const textTex = makeTextTex(data.label, data.sub, data.color);
      const textGeo = new THREE.PlaneGeometry(2.4, 0.9);
      const textMat = new THREE.MeshBasicMaterial({
        map: textTex,
        transparent: true,
        side: THREE.DoubleSide,
      });
      const textMesh = new THREE.Mesh(textGeo, textMat);
      textMesh.position.z = 0.01;
      textMesh.position.y = -0.25;
      group.add(textMesh);

      // Position
      group.position.copy(data.position);

      // User data
      group.userData = {
        originalPos: data.position.clone(),
        link: data.link,
        color: data.color,
        floatOffset: Math.random() * Math.PI * 2,
        card: card,
        edges: edges,
        iconMesh: iconMesh,
      };

      scene.add(group);
      billboards.push(group);
    }

    billboardData.forEach(createBillboard);

    // === Floating Particles ===
    const particleCount = 200;
    const particleGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const particleColors = new Float32Array(particleCount * 3);

    const colors = [
      new THREE.Color(0xFF8FA3),
      new THREE.Color(0xA8D8FF),
      new THREE.Color(0xFFB3C6),
    ];

    for (let i = 0; i < particleCount; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 30;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 20;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 15 - 5;
      const c = colors[Math.floor(Math.random() * colors.length)];
      particleColors[i * 3] = c.r;
      particleColors[i * 3 + 1] = c.g;
      particleColors[i * 3 + 2] = c.b;
    }

    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

    const particleMat = new THREE.PointsMaterial({
      size: 0.06,
      vertexColors: true,
      transparent: true,
      opacity: 0.6,
      sizeAttenuation: true,
    });

    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // === Floating Shapes (background) ===
    const bgShapes = [];

    function createBgShape() {
      const types = ['octahedron', 'icosahedron', 'tetrahedron', 'dodecahedron'];
      const type = types[Math.floor(Math.random() * types.length)];
      let geo;
      switch(type) {
        case 'octahedron': geo = new THREE.OctahedronGeometry(0.4 + Math.random() * 0.5); break;
        case 'icosahedron': geo = new THREE.IcosahedronGeometry(0.3 + Math.random() * 0.4); break;
        case 'tetrahedron': geo = new THREE.TetrahedronGeometry(0.4 + Math.random() * 0.5); break;
        case 'dodecahedron': geo = new THREE.DodecahedronGeometry(0.3 + Math.random() * 0.4); break;
      }

      const color = colors[Math.floor(Math.random() * colors.length)];
      const mat = new THREE.MeshStandardMaterial({
        color: color,
        transparent: true,
        opacity: 0.25,
        roughness: 0.5,
        metalness: 0.5,
        wireframe: Math.random() > 0.5,
      });

      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(
        (Math.random() - 0.5) * 25,
        (Math.random() - 0.5) * 15,
        (Math.random() - 0.5) * 10 - 5
      );
      mesh.userData = {
        rotSpeed: {
          x: (Math.random() - 0.5) * 0.01,
          y: (Math.random() - 0.5) * 0.01,
          z: (Math.random() - 0.5) * 0.01,
        },
        floatSpeed: 0.3 + Math.random() * 0.5,
        floatOffset: Math.random() * Math.PI * 2,
        originalY: mesh.position.y,
      };

      scene.add(mesh);
      bgShapes.push(mesh);
    }

    for (let i = 0; i < 30; i++) createBgShape();

    // === Mouse Interaction ===
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hoveredBillboard = null;
    let targetRotationX = 0;
    let targetRotationY = 0;
    let isDragging = false;
    let previousMouse = { x: 0, y: 0 };
    let autoRotate = true;

    document.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

      if (isDragging) {
        const dx = e.clientX - previousMouse.x;
        const dy = e.clientY - previousMouse.y;
        targetRotationY += dx * 0.005;
        targetRotationX += dy * 0.005;
        targetRotationX = Math.max(-0.5, Math.min(0.5, targetRotationX));
        previousMouse = { x: e.clientX, y: e.clientY };
        autoRotate = false;
      }

      // Raycast
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(scene.children, true);

      let found = null;
      for (const hit of intersects) {
        const obj = hit.object.parent;
        if (billboards.includes(obj)) {
          found = obj;
          break;
        }
      }

      if (found !== hoveredBillboard) {
        if (hoveredBillboard) {
          hoveredBillboard.userData.card.material.opacity = 0.85;
          hoveredBillboard.userData.edges.material.opacity = 0.6;
        }
        hoveredBillboard = found;
        document.body.style.cursor = hoveredBillboard ? 'pointer' : 'default';
        if (hoveredBillboard) {
          hoveredBillboard.userData.card.material.opacity = 1;
          hoveredBillboard.userData.edges.material.opacity = 1;
        }
      }
    });

    document.addEventListener('mousedown', (e) => {
      if (hoveredBillboard) {
        window.location.href = hoveredBillboard.userData.link;
      } else {
        isDragging = true;
        previousMouse = { x: e.clientX, y: e.clientY };
      }
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
      setTimeout(() => { autoRotate = true; }, 3000);
    });

    // Touch support
    document.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(scene.children, true);

      for (const hit of intersects) {
        const obj = hit.object.parent;
        if (billboards.includes(obj)) {
          window.location.href = obj.userData.link;
          return;
        }
      }

      isDragging = true;
      previousMouse = { x: touch.clientX, y: touch.clientY };
    });

    document.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      const touch = e.touches[0];
      const dx = touch.clientX - previousMouse.x;
      const dy = touch.clientY - previousMouse.y;
      targetRotationY += dx * 0.005;
      targetRotationX += dy * 0.005;
      targetRotationX = Math.max(-0.5, Math.min(0.5, targetRotationX));
      previousMouse = { x: touch.clientX, y: touch.clientY };
    });

    document.addEventListener('touchend', () => {
      isDragging = false;
    });

    // === Animation ===
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Billboard float & interaction
      billboards.forEach((bb) => {
        const ud = bb.userData;
        const baseY = ud.originalPos.y;
        bb.position.y = baseY + Math.sin(t * 0.8 + ud.floatOffset) * 0.2;

        if (bb === hoveredBillboard) {
          bb.rotation.z = Math.sin(t * 2) * 0.03;
          bb.scale.setScalar(1 + Math.sin(t * 3) * 0.02);
        } else {
          bb.rotation.z *= 0.95;
          bb.scale.setScalar(1);
        }
      });

      // Background shapes
      bgShapes.forEach((shape) => {
        shape.rotation.x += shape.userData.rotSpeed.x;
        shape.rotation.y += shape.userData.rotSpeed.y;
        shape.rotation.z += shape.userData.rotSpeed.z;
        shape.position.y = shape.userData.originalY +
          Math.sin(t * shape.userData.floatSpeed + shape.userData.floatOffset) * 0.3;
      });

      // Particles drift
      particles.rotation.y = t * 0.02;
      particles.rotation.x = t * 0.01;

      // Camera orbit
      if (autoRotate) {
        targetRotationY = Math.sin(t * 0.15) * 0.3;
        targetRotationX = Math.sin(t * 0.1) * 0.15;
      }

      camera.position.x += (targetRotationY * 3 - camera.position.x) * 0.05;
      camera.position.y += (-targetRotationX * 2 - camera.position.y) * 0.05;
      camera.lookAt(0, 0, 0);

      // Lights pulse
      pinkLight.intensity = 1.2 + Math.sin(t * 1.5) * 0.3;
      blueLight.intensity = 1.0 + Math.sin(t * 1.8 + 1) * 0.2;

      renderer.render(scene, camera);
    }

    // Hide loading
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
      }, 800);
    });

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();

    // Hide hint after interaction
    document.addEventListener('mousedown', () => {
      document.getElementById('hint').style.opacity = '0';
    }, { once: true });
  </script>
</body>
</html>
