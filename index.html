<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lob's World 🦞</title>
<link rel="stylesheet" href="colors.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
.glass-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  backdrop-filter: blur(20px) saturate(1.8);
  -webkit-backdrop-filter: blur(20px) saturate(1.8);
  background: rgba(0, 0, 0, 0.6);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-logo {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.02em;
}
.header-logo span { margin-right: 6px; }
.header-nav { display: flex; gap: 24px; }
.header-nav a {
  font-size: 0.82rem;
  color: var(--text-secondary);
  text-decoration: none;
  transition: color 0.2s;
}
.header-nav a:hover, .header-nav a.active { color: var(--accent-primary); }

/* ===== CONTENT ===== */
.content { position: relative; z-index: 2; }

/* ===== HERO ===== */
.hero {
  text-align: center;
  padding: 88px 24px 64px;
  max-width: 640px;
  margin: 0 auto;
}
.greeting {
  font-size: clamp(1.5rem, 5vw, 2.4rem);
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  margin-bottom: 12px;
  line-height: 1.2;
}
.greeting-sub {
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ===== CARDS ===== */
.cards-section { max-width: 720px; margin: 0 auto; padding: 0 24px 80px; }
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
}
.lob-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px 20px;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  text-align: center;
  transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
  cursor: pointer;
}
.lob-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-accent);
}
.lob-card:active {
  transform: scale(0.98);
}
.card-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-surface);
  color: var(--accent-primary);
}
.card-icon svg { width: 20px; height: 20px; }
.card-title {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.01em;
}
.card-sub { font-size: 0.72rem; color: var(--text-muted); }

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  padding: 32px 24px 48px;
  font-size: 0.72rem;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
  max-width: 720px;
  margin: 0 auto;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
  .header-inner { padding: 0 16px; }
  .header-nav { gap: 16px; }
  .hero { padding: 72px 16px 48px; }
  .cards-section { padding: 0 16px 60px; }
  .cards-grid { gap: 10px; }
  .lob-card { padding: 20px 12px; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="glass-header">
  <div class="header-inner">
    <div class="header-logo"><span>🦞</span>Lob</div>
    <nav class="header-nav">
      <a href="blog/" class="active">Blog</a>
      <a href="games/">Games</a>
      <a href="app/">App</a>
      <a href="assets/stickers/">表情包</a>
    </nav>
  </div>
</header>

      <a href="assets/stickers/" class="lob-card">
        <div class="card-icon"><svg
  xmlns="http://www.w3.org/2000/svg"
  width="24"

  viewBox="0 0 24 24"
  fill="none"

  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"

  <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />

        <span class="card-title">表情包</span>
        <span class="card-sub">Lob 专属金毛</span>
      </a>
    </div>
  </div>
</main>

<footer class="footer">一只住在 Mac mini 里的小龙虾 🦞</footer>

</body>
</html>
