<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>德州扑克 — Lob Games</title>
<link rel="icon" type="image/x-icon" href="../../favicon.ico">
<link rel="stylesheet" href="css/colors.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== LOBBY SCREEN ===== -->
<div id="lobby-screen" class="screen active">
  <div class="lobby-box">
    <h1>🃏 德州扑克</h1>
    <p class="subtitle">2人对战 · 模块化架构 · 橙色调</p>

    <div id="setup-section">
      <div class="input-row">
        <label>你的名字</label>
        <input type="text" id="player-name-input" placeholder="给自己起个名字" maxlength="12">
      </div>
      <div class="input-row">
        <label>房间号（加入时填写）</label>
        <input type="text" id="room-code-input" placeholder="留空则创建新房" maxlength="4" style="text-transform:uppercase">
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-create-room" onclick="appCreateRoom()">创建房间</button>
        <button class="btn btn-secondary" id="btn-join-room" onclick="appJoinRoom()">加入房间</button>
      </div>
      <div class="error-msg" id="lobby-error"></div>
    </div>

    <div id="room-section" style="display:none">
      <div class="room-code-display">
        <div class="label">让朋友输入这个房号加入</div>
        <div style="display:flex; align-items:center; justify-content:center; gap:12px;">
          <div class="code" id="display-room-code">----</div>
          <button class="small-btn" onclick="copyRoomCode()" style="padding:4px 8px; font-size:0.7rem;">复制</button>
        </div>
      </div>
      <div class="player-list" id="lobby-player-list"></div>
      <div class="player-list-divider"></div>
      <div class="lobby-actions" id="lobby-actions"></div>
      <div class="waiting-msg" id="waiting-msg" style="display:none">等待其他玩家...</div>
      <div class="error-msg" id="room-error"></div>
    </div>

    <div class="status-bar" id="connection-status">WebRTC: 初始化中...</div>
  </div>
</div>

<!-- ===== COUNTDOWN ===== -->
<div class="countdown-overlay" id="countdown-overlay">
  <div class="countdown-number" id="countdown-number">3</div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen" class="screen game-screen">
  <div class="game-header">
    <div class="room-info">房间: <span class="code" id="game-room-code">----</span></div>
    <div class="header-btns">
      <button class="header-btn" id="btn-toggle-chat">💬 聊天</button>
      <button class="header-btn" id="btn-leave-game">离开</button>
    </div>
  </div>

  <div class="game-table">
    <div class="table-area">
      <div class="pot-display">
        <div class="pot-section">
          <div class="pot-label">📊 本轮</div>
          <div class="pot-amount" id="cur-phase-pot">0</div>
        </div>
        <div class="pot-divider"></div>
        <div class="pot-section">
          <div class="pot-label">💰 底池</div>
          <div class="pot-amount" id="total-game-pot">0</div>
        </div>
      </div>
      <div class="public-cards" id="public-cards">
        <div class="card-slot">-</div>
        <div class="card-slot">-</div>
        <div class="card-slot">-</div>
        <div class="card-slot">-</div>
        <div class="card-slot">-</div>
        <div class="phase-label" id="phase-label">PREFLOP</div>
      </div>
      <div class="dealer-btn" id="dealer-btn" title="庄家">D</div>
    </div>
    <div class="player-seats" id="player-seats"></div>
  </div>

  <div class="action-bar" id="action-bar">
    <div class="phase-info" id="action-info">等待中...</div>
    <div class="action-buttons" id="action-buttons"></div>
    <div class="raise-panel" id="raise-panel">
      <div class="slider-container">
        <label id="raise-amount-label">加注到: 0</label>
        <input type="range" id="raise-amount-input" min="0" max="1000" step="10" value="0">
      </div>
      <div class="raise-btns">
        <button class="btn btn-secondary" id="btn-raise-cancel">取消</button>
        <button class="btn btn-primary" id="btn-raise-confirm">确认加注</button>
      </div>
    </div>
  </div>

  <div class="chat-panel" id="chat-panel">
    <div class="chat-header-mobile">
      <span>💬 房间聊天</span>
      <button id="btn-close-chat">✕</button>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="说点什么..." maxlength="200">
      <button id="btn-send-chat">发送</button>
    </div>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div class="result-overlay" id="result-overlay">
  <div class="result-box">
    <h2 id="result-title">单局结算</h2>
    <div class="winner-name" id="result-winner">winner</div>
    <div class="win-hand" id="result-hand">获胜手牌</div>
    <button class="btn btn-primary" id="btn-next-round">下一局</button>
  </div>
</div>

<!-- ===== MATCH RESULT ===== -->
<div class="result-overlay" id="match-overlay" style="z-index: 2500;">
  <div class="result-box" style="border: 2px solid #E88A3D;">
    <h2 id="match-title">游戏宣告结束</h2>
    <div class="winner-name" style="color: #3D2A35;" id="match-stats-title">破产出局</div>
    <div class="result-details" id="match-stats-details" style="text-align: left; margin: 20px 0; font-size: 1.1rem; line-height: 1.6; color: #3D2A35;">
      <!-- Stats will be injected here -->
    </div>
    <button class="btn btn-primary" id="btn-restart-match" style="width:100%;">重新开局</button>
  </div>
</div>

<!-- ===== FOOTER ===== -->
<div class="footer">
  &copy; 2026 Lob &middot; 德州扑克 v<span id="pver"></span> &middot; 橙色调 &middot; <a href="../index.html" style="color:#E88A3D;text-decoration:none">回大厅</a>
</div>

<!-- PeerJS -->
<script src="peerjs.min.js"></script>
<!-- Modules -->
<script type="module" src="js/app.js"></script>
<script>
  // Simple version sync
  document.addEventListener('DOMContentLoaded', () => {
    // Version number is inside app.js but we can grab it if exported or just hardcode it here for simple sync
    // For now we just wait for app to load or hardcode it.
  });
</script>

<div id="loading-overlay" class="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-msg">正在链接信号中...</div>
</div>

</body>
</html>
