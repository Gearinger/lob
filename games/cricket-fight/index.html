<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>赛博斗蛐蛐</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="n"></canvas>
    <div class="cr tl">🦗</div><div class="cr br">⚔</div>

    <div id="sp">
        <div class="se">🦗</div>
        <div class="tt">赛博斗蛐蛐</div>
        <div class="su">极简文字版 · 回合策略</div>
        <div class="rl">
            <div>⚔️ 自选流派，围绕它构筑战斗风格</div>
            <div>💰 金币可强化、回血、刷新突破</div>
            <div>👑 每5轮Boss战，奖励翻倍</div>
            <div>🔴🟠🔵🟢⚪ 突破颜色代表稀有度</div>
        </div>
        <button class="bt" id="sbt">开始游戏</button>
    </div>

    <div id="ss" class="h">
        <div class="ss-wrap">
            <div class="ss-title">─── 选择流派 ───</div>
            <div class="ss-hint">围绕初始流派构筑你的蛐蛐战斗风格</div>
            <div id="ss-grid" class="ss-grid"></div>
        </div>
    </div>

    <div id="gt">
        <h1>🦗 赛博斗蛐蛐</h1>
        <div id="ri"><span id="st">初始</span> · 第<span id="rn">1</span>轮</div>
    </div>

    <div id="arena">
        <div class="p" id="pp">
            <div class="ph">🟢 我方 <span id="pn">--</span></div>
            <div class="src">⚔️ <span id="sb">--</span> Lv.<span id="sl">1</span></div>
            <div class="hp-wrap">
                <div class="hbb"><div class="hf p-bar" id="hb" style="width:100%"></div></div>
                <div class="hpt">❤️ <span id="hv">150</span>/<span id="hm">150</span></div>
            </div>
            <div class="src s2">⚔️<span id="patk">12-16</span> 🛡️<span id="pdef">3</span> 💥<span id="pcrt">5</span>% 🚪<span id="pdge">0</span>% ☠️<span id="ppoi">0</span></div>
            <div class="eq-row" id="peq"></div>
            <div class="ach-row" id="achRow"></div>
            <div class="act-row" id="actRow"></div>
        </div>
        <div class="p" id="ep">
            <div class="ph">🔴 敌方 <span id="en">--</span></div>
            <div class="src"><span id="esb">--</span> Lv.<span id="esl">1</span></div>
            <div class="hp-wrap">
                <div class="hbb"><div class="hf e-bar" id="ehb" style="width:100%"></div></div>
                <div class="hpt">❤️ <span id="ehv">0</span>/<span id="ehm">0</span></div>
            </div>
            <div class="src s2">⚔️<span id="eatk">0-0</span> 🛡️<span id="edef">0</span> 💥<span id="ecrt">0</span>% 🚪<span id="edge">0</span>% ☠️<span id="epoi">0</span></div>
        </div>
    </div>

    <div class="p lp">
        <div class="ph">📝 战斗日志 <span id="rind" class="rind"></span><button class="btn-clr" id="bclear" title="清除日志">✕</button></div>
        <div id="la"></div>
    </div>

    <div class="p bp">
        <div id="gd">💰 <span id="gv">20</span></div>
        <div class="btn-row">
            <button class="btn p2" id="bn">⚔ 开始第<span id="bnt">1</span>轮</button>
            <button class="btn spd" id="bspeed">1x</button>
        </div>
        <div class="btn-row">
            <button class="btn h" id="bu">⬆ 强化 15💰</button>
            <button class="btn heal h" id="bheal">❤️ 回血 8💰</button>
        </div>
        <button class="btn" id="bwiki">📖 查看图鉴</button>
    </div>

    <div id="co" class="h">
        <div class="cm">
            <div class="ch">─── 选择一项突破 ───</div>
            <div id="cb"></div>
            <button class="btn btn-rf h" id="brf">🔄 刷新选项 10💰</button>
        </div>
    </div>

    <div id="eo" class="h">
        <div class="eo-inner">
            <div class="eo-title">🎁 发现装备！</div>
            <div id="eo-body"></div>
        </div>
    </div>

    <div id="ult-fx"><div class="ult-text" id="ult-txt"></div></div>

    <div id="ro" class="h">
        <div class="rc">
            <div class="rt" id="rt">💀 战败</div>
            <div class="rd" id="rd"></div>
        </div>
    </div>

    <div id="wiki" class="h">
        <div class="wiki-inner">
            <div class="wiki-header">
                <span>📖 赛博图鉴</span>
                <button class="wiki-close" id="wikiclose">✕</button>
            </div>
            <div class="wiki-tabs">
                <button class="wiki-tab on" data-t="s">流派</button>
                <button class="wiki-tab" data-t="o">突破</button>
                <button class="wiki-tab" data-t="e">装备</button>
                <button class="wiki-tab" data-t="t">特质</button>
            </div>
            <div id="wiki-body" class="wiki-body"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
