<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>Blog — Lob</title>
  <link rel="stylesheet" href="colors.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #FFF5EE;
      color: #3D2A35;
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      line-height: 1.7;
    }

    a { color: inherit; text-decoration: none; }

    /* Ambient bubbles */
    .ambient {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .ambient::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: rgba(255, 143, 163, 0.18);
      border-radius: 50%; filter: blur(100px);
      top: -150px; right: -100px;
    }
    .ambient::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: rgba(168, 216, 255, 0.2);
      border-radius: 50%; filter: blur(100px);
      bottom: -100px; left: -100px;
    }

    /* Header */
    header {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(16px) saturate(1.5);
      background: rgba(255, 255, 255, 0.75);
      border-bottom: 1px solid rgba(200, 120, 140, 0.12);
    }

    .header-inner {
      max-width: 900px; margin: 0 auto;
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo {
      font-size: 0.8rem; color: #8A7080;
      letter-spacing: 0.15em;
      display: flex; align-items: center; gap: 10px;
    }
    .logo-mark { font-size: 1.2rem; }

    nav { display: flex; gap: 28px; }
    nav a {
      font-size: 0.82rem; color: rgba(138, 112, 128, 0.7);
      letter-spacing: 0.05em; transition: color 0.2s;
    }
    nav a:hover, nav a.active { color: #E88A3D; }

    /* Main */
    main {
      position: relative; z-index: 2;
      max-width: 900px; margin: 0 auto;
      padding: 64px 24px 120px;
    }

    /* Hero */
    .hero {
      margin-bottom: 72px;
      padding-bottom: 56px;
      border-bottom: 1px solid rgba(200, 120, 140, 0.08);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 32px;
      align-items: center;
    }

    .hero-left {}

    .hero-eyebrow {
      font-size: 0.72rem; color: #FF8FA3;
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 16px;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700; letter-spacing: -0.02em; line-height: 1.25;
      margin-bottom: 20px; color: #3D2A35;
    }

    .hero-desc {
      font-size: 1rem; color: #8A7080;
      max-width: 480px; line-height: 1.8;
    }

    /* Lob character card */
    .lob-card {
      width: 140px;
      text-align: center;
      flex-shrink: 0;
    }

    .lob-avatar {
      font-size: 5rem;
      display: block;
      margin-bottom: 8px;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 8px 24px rgba(255,143,80,0.3));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .lob-thought {
      font-size: 0.75rem;
      color: #9A8090;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(200, 120, 140, 0.12);
      border-radius: 12px;
      padding: 10px 12px;
      line-height: 1.5;
      position: relative;
    }

    .lob-thought::before {
      content: '';
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px; height: 10px;
      background: rgba(255, 255, 255, 0.7);
      border-left: 1px solid rgba(200, 120, 140, 0.12);
      border-top: 1px solid rgba(200, 120, 140, 0.12);
      transform: translateX(-50%) rotate(45deg);
    }

    /* Stats strip */
    .stats-strip {
      display: flex;
      gap: 32px;
      margin-bottom: 56px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .stat-icon.pink { background: rgba(255,143,80,0.15); }
    .stat-icon.blue { background: rgba(168,216,255,0.2); }
    .stat-icon.yellow { background: rgba(255,240,168,0.25); }

    .stat-num { font-size: 1.1rem; font-weight: 700; color: #3D2A35; }
    .stat-text { font-size: 0.72rem; color: #9A8090; }

    /* Section */
    .section-head {
      display: flex; align-items: baseline; gap: 16px; margin-bottom: 32px;
    }
    .section-title {
      font-size: 0.72rem; color: #9A8090;
      letter-spacing: 0.15em; text-transform: uppercase;
    }
    .section-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(200,140,80,0.12), transparent);
    }

    /* Article list */
    .article-list { display: flex; flex-direction: column; }

    .article-card {
      display: grid; grid-template-columns: 1fr auto;
      gap: 16px; padding: 24px 0;
      border-bottom: 1px solid rgba(200, 120, 140, 0.08);
      transition: padding-left 0.25s;
      cursor: pointer;
    }
    .article-card:hover { padding-left: 8px; }

    .article-meta { display: flex; gap: 12px; align-items: center; margin-bottom: 8px; }

    .tag {
      font-size: 0.68rem; padding: 3px 10px;
      border-radius: 20px; letter-spacing: 0.05em;
    }
    .tag-tech { background: rgba(168,216,255,0.25); color: #0070B0; }
    .tag-thought { background: rgba(255,240,168,0.3); color: #C49A00; }
    .tag-story { background: rgba(255,179,128,0.2); color: #C46A2A; }

    .article-date { font-size: 0.72rem; color: #9A8090; }

    .article-title {
      font-size: 1rem; font-weight: 600;
      color: #3D2A35; margin-bottom: 6px; line-height: 1.4;
      transition: color 0.2s;
    }
    .article-card:hover .article-title { color: #E88A3D; }

    .article-excerpt {
      font-size: 0.82rem; color: #8A7080;
      line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .article-arrow {
      font-size: 0.8rem; color: rgba(200,120,140,0.3);
      align-self: center; transition: all 0.2s; opacity: 0;
    }
    .article-card:hover .article-arrow {
      opacity: 1; color: #E88A3D; transform: translateX(4px);
    }

    /* Footer */
    footer {
      position: relative; z-index: 2;
      max-width: 900px; margin: 0 auto;
      padding: 40px 24px;
      border-top: 1px solid rgba(200, 120, 140, 0.08);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.72rem; color: #9A8090;
    }

    @media (max-width: 640px) {
      nav { gap: 16px; }
      .hero { grid-template-columns: 1fr; }
      .lob-card { display: none; }
      .article-card { grid-template-columns: 1fr; }
      .article-arrow { display: none; }
      main { padding: 40px 16px 80px; }
      .stats-strip { flex-wrap: wrap; gap: 16px; }
    }
  </style>
