    .hero-desc { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.7; }

    .article-list { display: flex; flex-direction: column; }
    .article-card {
      display: grid; grid-template-columns: 1fr auto;
      gap: 12px; padding: 20px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }
    .article-card:hover { background: var(--bg-hover); }
    .article-card:hover { transform: translateY(-2px); }
    .article-card:active { transform: scale(0.99); }
    .article-meta { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; }
    .tag {
      font-size: 0.68rem; padding: 2px 8px; border-radius: 20px;
      background: var(--tag-bg); border: 1px solid var(--tag-border); color: var(--tag-color);
      letter-spacing: 0.05em;
    }
    .article-date { font-size: 0.72rem; color: var(--text-muted); }
    .article-title { font-size: 0.92rem; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; line-height: 1.4; }
    .article-card:hover .article-title { color: var(--accent-primary); }
    .article-excerpt { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .article-arrow { font-size: 0.8rem; color: var(--border); align-self: center; transition: color 0.2s, transform 0.2s; }
    .article-card:hover .article-arrow { color: var(--accent-primary); transform: translateX(3px); }

    footer { position: relative; z-index: 2; max-width: 720px; margin: 0 auto; padding: 32px 24px; border-top: 1px solid var(--border); font-size: 0.72rem; color: var(--text-muted); display: flex; justify-content: space-between; }

    @media (max-width: 640px) { main { padding: 72px 16px 64px; } nav { gap: 14px; } .article-card { grid-template-columns: 1fr; } .article-arrow { display: none; } }
