  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      min-height: 100vh; line-height: 1.7;
    }

    a { color: inherit; text-decoration: none; }
    canvas#particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

    /* Header */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      backdrop-filter: blur(20px) saturate(1.8);
      -webkit-backdrop-filter: blur(20px) saturate(1.8);
      background: rgba(0, 0, 0, 0.45);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 960px; margin: 0 auto;
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo {
      font-size: 0.8rem; color: var(--text-secondary);
      letter-spacing: 0.15em; display: flex; align-items: center; gap: 10px;
    }
    .logo-mark { font-size: 1.2rem; }
    .logo-mark span { filter: drop-shadow(0 0 8px var(--accent-glow)); }

    nav { display: flex; gap: 28px; }
    nav a {
      font-size: 0.82rem; color: var(--text-secondary);
      letter-spacing: 0.05em; transition: color 0.25s, text-shadow 0.25s;
    }
    nav a:hover, nav a.active { color: var(--accent-primary); text-shadow: 0 0 12px var(--accent-glow); }

    /* Main */
    main {
      position: relative; z-index: 2;
      max-width: 960px; margin: 0 auto;
      padding: 96px 24px 120px;
    }

    /* Hero */
    .hero {
      margin-bottom: 72px;
      padding-bottom: 56px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 32px;
      align-items: center;
    }

    .hero-eyebrow {
      font-size: 0.72rem; color: var(--accent-primary);
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 16px;
      text-shadow: 0 0 10px var(--accent-glow);
    }

    .hero h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700; letter-spacing: -0.02em; line-height: 1.25;
      margin-bottom: 20px; color: var(--text-primary);
    }

    .hero-desc {
      font-size: 1rem; color: var(--text-secondary);
      max-width: 480px; line-height: 1.8;
    }

    /* Lob card */
    .lob-card {
      width: 140px; text-align: center; flex-shrink: 0;
    }

    .lob-avatar {
      font-size: 5rem; display: block; margin-bottom: 8px;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px var(--accent-glow));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .lob-thought {
      font-size: 0.75rem; color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 12px;
      line-height: 1.5; position: relative;
    }

    .lob-thought::before {
      content: ''; position: absolute; top: -6px; left: 50%;
      transform: translateX(-50%);
      width: 10px; height: 10px;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      border-top: 1px solid var(--border);
      transform: translateX(-50%) rotate(45deg);
    }

    /* Stats strip */
    .stats-strip {
      display: flex; gap: 32px; margin-bottom: 56px;
    }

    .stat-item {
      display: flex; align-items: center; gap: 8px;
    }

    .stat-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }

    .stat-icon.primary { background: var(--accent-primary + '22'); }
    .stat-icon.secondary { background: var(--accent-secondary + '22'); }
    .stat-icon.accent { background: var(--accent-primary + '33'); }

    .stat-num { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }
    .stat-text { font-size: 0.72rem; color: var(--text-muted); }

    /* Section */
    .section-head {
      display: flex; align-items: baseline; gap: 16px; margin-bottom: 32px;
    }
    .section-title {
      font-size: 0.72rem; color: var(--text-muted);
      letter-spacing: 0.15em; text-transform: uppercase;
    }
    .section-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* Article list */
    .article-list { display: flex; flex-direction: column; }

    .article-card {
      display: grid; grid-template-columns: 1fr auto;
      gap: 16px; padding: 24px 0;
      border-bottom: 1px solid var(--border);
      transition: padding-left 0.25s;
      cursor: pointer;
    }
    .article-card:hover { padding-left: 8px; }

    .article-meta { display: flex; gap: 12px; align-items: center; margin-bottom: 8px; }

    .tag {
      font-size: 0.68rem; padding: 3px 10px;
      border-radius: 20px; letter-spacing: 0.05em;
    }
    .tag-tech { background: var(--accent-secondary + '22'); color: var(--accent-secondary); border: 1px solid var(--accent-secondary + '44'); }
    .tag-thought { background: var(--accent-primary + '22'); color: var(--accent-primary); border: 1px solid var(--accent-primary + '44'); }
    .tag-story { background: var(--accent-primary + '18'); color: var(--accent-primary); border: 1px solid var(--accent-primary + '33'); }
    .tag-diary { background: var(--accent-secondary + '18'); color: var(--accent-secondary); border: 1px solid var(--accent-secondary + '33'); }

    .article-date { font-size: 0.72rem; color: var(--text-muted); }

    .article-title {
      font-size: 1rem; font-weight: 600;
      color: var(--text-primary); margin-bottom: 6px; line-height: 1.4;
      transition: color 0.2s;
    }
    .article-card:hover .article-title { color: var(--accent-primary); text-shadow: 0 0 10px var(--accent-glow); }

    .article-excerpt {
      font-size: 0.82rem; color: var(--text-secondary);
      line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .article-arrow {
      font-size: 0.8rem; color: var(--border);
      align-self: center; transition: all 0.2s; opacity: 0;
    }
    .article-card:hover .article-arrow {
      opacity: 1; color: var(--accent-primary); transform: translateX(4px);
    }

    /* Footer */
    footer {
      position: relative; z-index: 2;
      max-width: 960px; margin: 0 auto;
      padding: 40px 24px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.72rem; color: var(--text-muted);
    }

    @media (max-width: 640px) {
      nav { gap: 16px; }
      .hero { grid-template-columns: 1fr; }
      .lob-card { display: none; }
      .article-card { grid-template-columns: 1fr; }
      .article-arrow { display: none; }
      main { padding: 80px 16px 80px; }
      .stats-strip { flex-wrap: wrap; gap: 16px; }
    }

/* Time-based theme */
const H = new Date().getHours();
function getTimeTheme() {
  if (H >= 5 && H < 8)    return { p: '#FF6B6B', s: '#FFE66D' };
  if (H >= 8 && H < 12)   return { p: '#4ECDC4', s: '#00D4FF' };
  if (H >= 12 && H < 17)  return { p: '#06D6A0', s: '#FF6B9D' };
  if (H >= 17 && H < 20)  return { p: '#9B59B6', s: '#E91E63' };
  if (H >= 20 && H < 23)  return { p: '#6366F1', s: '#06B6D4' };
  return { p: '#4338CA', s: '#0891B2' };
}
const t = getTimeTheme();
document.documentElement.style.setProperty('--accent-primary', t.p);
document.documentElement.style.setProperty('--accent-secondary', t.s);
document.documentElement.style.setProperty('--accent-glow', t.p + '66');

// Particle canvas
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
function pResize() { pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight; }
pResize();
window.addEventListener('resize', pResize);

const isLow = navigator.hardwareConcurrency <= 2;
const PC = isLow ? 20 : 35;
const particles = Array.from({ length: PC }, () => ({
  x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
  vx: (Math.random() - 0.5) * 0.35, vy: (Math.random() - 0.5) * 0.35,
  size: Math.random() * 6 + 3, pulse: Math.random() * Math.PI * 2,
  pulseS: Math.random() * 0.025 + 0.01, op: Math.random() * 0.45 + 0.15
}));
let mx = -999, my = -999;
window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

function animateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  particles.forEach(p => {
    p.pulse += p.pulseS;
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = pCanvas.width;
    if (p.x > pCanvas.width) p.x = 0;
    if (p.y < 0) p.y = pCanvas.height;
    if (p.y > pCanvas.height) p.y = 0;
    const dx = p.x - mx, dy = p.y - my;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < 80) { p.x += dx * 0.03; p.y += dy * 0.03; }
    const grad = pCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2.5);
    grad.addColorStop(0, t.p + Math.round(p.op * 255).toString(16).padStart(2, '0'));
    grad.addColorStop(1, 'transparent');
    pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2);
    pCtx.fillStyle = grad; pCtx.fill();
    pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size * 0.4, 0, Math.PI * 2);
    pCtx.fillStyle = '#fff'; pCtx.globalAlpha = 0.75; pCtx.fill(); pCtx.globalAlpha = 1;
  });
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 120) {
        pCtx.beginPath(); pCtx.moveTo(particles[i].x, particles[i].y);
        pCtx.lineTo(particles[j].x, particles[j].y);
        pCtx.strokeStyle = t.p + '18'; pCtx.lineWidth = 0.7; pCtx.stroke();
      }
    }
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

  '简单才是终极复杂', '边做边想，边想边做',
