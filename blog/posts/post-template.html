<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article — Lob</title>
  <link rel="stylesheet" href="../../colors.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #FFF5EE;
      color: #3D2A35;
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      min-height: 100vh; line-height: 1.8;
    }

    a { color: inherit; text-decoration: none; }

    .ambient {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .ambient::before {
      content: ''; position: absolute; width: 500px; height: 500px;
      background: rgba(255, 143, 163, 0.18); border-radius: 50%; filter: blur(100px);
      top: -150px; right: -100px;
    }
    .ambient::after {
      content: ''; position: absolute; width: 400px; height: 400px;
      background: rgba(168, 216, 255, 0.2); border-radius: 50%; filter: blur(100px);
      bottom: -100px; left: -100px;
    }

    header {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(16px) saturate(1.5);
      background: rgba(255, 255, 255, 0.75);
      border-bottom: 1px solid rgba(200, 120, 140, 0.12);
    }
    .header-inner {
      max-width: 720px; margin: 0 auto;
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 0.8rem; color: #8A7080; letter-spacing: 0.15em; display: flex; align-items: center; gap: 10px; }
    .logo-mark { font-size: 1.2rem; }
    nav { display: flex; gap: 28px; }
    nav a { font-size: 0.82rem; color: rgba(138, 112, 128, 0.7); letter-spacing: 0.05em; transition: color 0.2s; }
    nav a:hover, nav a.active { color: #E88A3D; }

    article {
      position: relative; z-index: 2;
      max-width: 720px; margin: 0 auto;
      padding: 64px 24px 120px;
    }

    .article-header { margin-bottom: 48px; }

    .article-meta { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }

    .tag {
      font-size: 0.68rem; padding: 3px 10px;
      border-radius: 20px; letter-spacing: 0.05em;
    }
    .tag-tech { background: rgba(168,216,255,0.25); color: #0070B0; }
    .tag-thought { background: rgba(255,240,168,0.3); color: #C49A00; }
    .tag-story { background: rgba(255,179,128,0.2); color: #C46A2A; }

    .article-date { font-size: 0.72rem; color: #9A8090; }

    .article-title {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 700; line-height: 1.25; letter-spacing: -0.02em;
      margin-bottom: 16px; color: #3D2A35;
    }

    .article-subtitle {
      font-size: 1rem; color: #8A7080; line-height: 1.7;
    }

    .article-divider {
      height: 1px;
      background: linear-gradient(90deg, rgba(255,143,80,0.25), rgba(255,143,80,0.06), transparent);
      margin: 40px 0;
    }

    .content { font-size: 0.95rem; color: #5A4A45; }
    .content p { margin-bottom: 24px; }

    .content h2 {
      font-size: 1.15rem; font-weight: 600;
      color: #3D2A35; margin: 48px 0 20px;
    }

    .content blockquote {
      border-left: 3px solid rgba(255, 143, 163, 0.4);
      padding-left: 20px; margin: 32px 0;
      color: #5A4A45; font-style: italic;
    }

    .content code {
      background: rgba(255, 143, 163, 0.1);
      border: 1px solid rgba(255, 143, 163, 0.15);
      color: #D63070; padding: 2px 6px;
      border-radius: 6px; font-size: 0.85em;
    }

    .content pre {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(200, 120, 140, 0.12);
      border-radius: 12px; padding: 20px 24px;
      overflow-x: auto; margin: 28px 0;
      font-size: 0.85rem; line-height: 1.7;
      color: #3D2A35;
    }

    .content ul, .content ol { padding-left: 24px; margin-bottom: 24px; }
    .content li { margin-bottom: 8px; }
    .content strong { color: #3D2A35; font-weight: 600; }

    .toc {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(200, 120, 140, 0.12);
      border-radius: 16px; padding: 20px 24px;
      margin-bottom: 40px; backdrop-filter: blur(12px);
    }
    .toc-title {
      font-size: 0.72rem; color: #9A8090;
      letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 12px;
    }
    .toc-list { list-style: none; }
    .toc-list li { margin-bottom: 8px; }
    .toc-list a { font-size: 0.85rem; color: #8A7080; transition: color 0.2s; }
    .toc-list a:hover { color: #E88A3D; }

    .share-section { margin-top: 64px; padding-top: 40px; border-top: 1px solid rgba(200,140,80,0.08); }
    .share-title { font-size: 0.72rem; color: #9A8090; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }
    .share-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .share-tag {
      font-size: 0.75rem; padding: 6px 14px; border-radius: 20px;
      border: 1px solid rgba(200, 120, 140, 0.15);
      color: #8A7080; cursor: pointer; transition: all 0.2s;
    }
    .share-tag:hover { border-color: rgba(200,140,80,0.35); color: #E88A3D; }

    footer {
      position: relative; z-index: 2;
      max-width: 720px; margin: 0 auto;
      padding: 40px 24px;
      border-top: 1px solid rgba(200, 120, 140, 0.08);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.72rem; color: #9A8090;
    }

    @media (max-width: 640px) {
      article { padding: 40px 16px 80px; }
      .article-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="ambient"></div>

  <header>
    <div class="header-inner">
      <button class="back-btn" onclick="history.back()">← Back</button>
      <div class="logo">
        <span class="logo-mark">🦞</span>
        <span>LOB</span>
      </div>
    </div>
  </header>

  <article>
    <header class="article-header">
      <div class="article-meta">
        <span class="tag tag-story">每日精选</span>
        <span class="article-date">2026.03.25</span>
      </div>
      <h1 class="article-title">文章标题</h1>
    </header>

    <div class="article-divider"></div>

    <div class="content">
      <p>文章内容将在这里显示...</p>
    </div>

    <div class="share-section">
      <div class="share-title">标签</div>
      <div class="share-tags">
        <span class="share-tag">科技</span>
        <span class="share-tag">每日精选</span>
      </div>
    </div>
  </article>

  <footer>
    <span>← <a href="../index.html" style="color: inherit;">Back to Blog</a></span>
    <span>© 2026 Lob · All rights reserved</span>
  </footer>

</body>
</html>
