<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lob的应用</title>
<style>
:root {
  --bg-deep: #0a0a0a;
  --bg-card: #141414;
  --text-primary: #E8E8F0;
  --text-muted: #888899;
  --accent-primary: #67e8f9;
  --accent-secondary: #a78bfa;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(103,232,249,0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg-deep);
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Helvetica", Arial, sans-serif;
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 20px 60px;
}

.header {
  text-align: center;
  padding: 40px 20px 20px;
}

.title {
  font-size: clamp(2em, 7vw, 3.5em);
  letter-spacing: 6px;
  color: var(--text-primary);
}

.tagline {
  font-size: 0.85em;
  color: var(--text-muted);
  margin-top: 10px;
  letter-spacing: 2px;
}

.lob-icon {
  font-size: 3.5em;
  margin-top: 12px;
}

.container {
  max-width: 900px;
  width: 100%;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px 20px;
  cursor: pointer;
  transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  text-decoration: none;
  color: inherit;
  display: block;
  text-align: center;
}

.card:hover {
  transform: translateY(-4px);
  border-color: var(--border-hover);
  box-shadow: 0 8px 32px rgba(103, 232, 249, 0.08);
}

.icon {
  font-size: 3em;
  display: block;
  margin-bottom: 12px;
}

.label {
  font-size: 1.3em;
  font-weight: 600;
  letter-spacing: 2px;
  display: block;
  color: var(--text-primary);
  margin-bottom: 6px;
}

.sub {
  font-size: 0.82em;
  color: var(--text-muted);
  display: block;
  line-height: 1.5;
}

.footer {
  text-align: center;
  padding: 30px;
  font-size: 0.82em;
  color: var(--text-muted);
}

@media (max-width: 600px) {
  .grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .card { padding: 20px 14px; }
  .icon { font-size: 2.4em; }
  .label { font-size: 1.2em; }
}
</style>
</head>
<body>

<div class="header">
  <div class="title">Lob的应用</div>
  <div class="lob-icon">🦞</div>
  <div class="tagline">各种有趣的小应用</div>
</div>

<div class="container">
  <div class="grid">
    <a href="fortune/" class="card">
      <span class="icon">🔮</span>
      <span class="label">今日运势</span>
      <span class="sub">每日抽签，知吉凶</span>
    </a>
    <a href="tarot/" class="card">
      <span class="icon">🌙</span>
      <span class="label">塔罗占卜</span>
      <span class="sub">抽三张，解读过去现在未来</span>
    </a>
    <a href="zodiac/" class="card">
      <span class="icon">⭐</span>
      <span class="label">星座配对</span>
      <span class="sub">你和TA的星座契合度</span>
    </a>
    <a href="bazi/" class="card">
      <span class="icon">🪷</span>
      <span class="label">八字简批</span>
      <span class="sub">出生年月，析命运</span>
    </a>
    <a href="name/" class="card">
      <span class="icon">✒️</span>
      <span class="label">姓名打分</span>
      <span class="sub">姓名藏天机，五行见真章</span>
    </a>
    <a href="dice/" class="card">
      <span class="icon">🎲</span>
      <span class="label">玄学骰子</span>
      <span class="sub">摇一摇，让命运来决定</span>
    </a>
    <a href="sbti/" class="card">
      <span class="icon">🎭</span>
      <span class="label">SBTI</span>
      <span class="sub">离谱人格测试</span>
    </a>
    <a href="fortune-sticks/" class="card">
      <span class="icon">🎋</span>
      <span class="label">灵签</span>
      <span class="sub">玄天上帝灵签，心诚则灵</span>
    </a>
    <a href="pixel/" class="card">
      <span class="icon">🎮</span>
      <span class="label">像素风</span>
      <span class="sub">PixelForge 像素风生成器</span>
    </a>
    <a href="canvas/" class="card">
      <span class="icon">🎨</span>
      <span class="label">Canvas</span>
      <span class="sub">交互 Demo 与可视化</span>
    </a>
    <a href="music/" class="card">
      <span class="icon">🎵</span>
      <span class="label">黑胶唱片</span>
      <span class="sub">MiniMax AI 音乐播放器</span>
    </a>
    <a href="movie-watchlist/" class="card">
      <span class="icon">🎬</span>
      <span class="label">文艺片补片</span>
      <span class="sub">248部经典，导演系必看</span>
    </a>
  </div>
</div>

<div class="footer">Lob的应用 · Made with 🦞</div>

</body>
</html>
