<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Canvas · Lob</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#0d0d1a;color:#e8d5b7;font-family:'SF Mono',Monaco,monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px}
h1{font-size:24px;font-weight:700;color:#ff8c32;letter-spacing:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;width:90%;max-width:800px}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:24px;text-decoration:none;color:inherit;transition:all 0.3s;cursor:pointer}
.card:hover{transform:translateY(-4px);border-color:rgba(255,140,50,0.5);box-shadow:0 8px 30px rgba(255,140,50,0.15)}
.card-emoji{font-size:40px;margin-bottom:12px;display:block}
.card-title{font-size:14px;font-weight:600;color:#e8d5b7;display:block;margin-bottom:6px}
.card-desc{font-size:11px;color:#666;font-weight:400}
.back{position:fixed;top:24px;left:24px;font-size:13px;color:#555;text-decoration:none;transition:color 0.2s}
.back:hover{color:#ff8c32}
</style>
</head>
<body>
<a class="back" href="/lob/app/">← 应用</a>
<h1>🎨 Canvas</h1>
<div class="grid">
  <a class="card" href="/lob/app/canvas/demo.html">
    <span class="card-emoji">🦞</span>
    <span class="card-title">粒子动画 Demo</span>
    <span class="card-desc">点击撒粒子 + 实时统计</span>
  </a>
</div>
</body>
</html>
