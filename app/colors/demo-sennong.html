<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>森浓 — 配色 Demo</title>
<style>
:root{--primary:#3d5a45;--bg:#e8e0d0;--card:#fff;--text:#2a3f30;--sub:#6a7a6a;--accent:#8b6f5a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC',serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{background:rgba(255,255,255,.8);backdrop-filter:blur(10px);padding:18px 32px;display:flex;justify-content:space-between;align-items:center}
.nav-brand{font-size:1em;color:var(--primary);font-weight:600;letter-spacing:.08em}
.nav-link{font-size:.8em;color:var(--sub);text-decoration:none}
.hero{padding:80px 32px 60px;max-width:640px;margin:0 auto;text-align:center}
.hero-title{font-size:clamp(1.8em,5vw,2.6em);font-weight:300;letter-spacing:.12em;line-height:1.6;margin-bottom:16px}
.hero-sub{font-size:.85em;color:var(--sub);font-weight:300;line-height:2;max-width:320px;margin:0 auto}
.products{padding:0 20px 80px;max-width:700px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
.product{background:var(--card);border-radius:12px;overflow:hidden}
.product-img{aspect-ratio:4/3;background:var(--primary);opacity:.85}
.product-info{padding:16px}
.product-name{font-size:.88em;font-weight:600;margin-bottom:4px}
.product-tag{font-size:.7em;color:var(--sub)}
.footer{padding:40px;text-align:center;font-size:.75em;color:var(--sub)}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-brand">森浓</div>
  <a href="index.html" class="nav-link">← 返回</a>
</div>
<div class="hero">
  <h1 class="hero-title">自然的馈赠<br>生活的温度</h1>
  <p class="hero-sub">源自森林，归于生活，每一处细节都带着自然的呼吸</p>
</div>
<div class="products">
  <div class="product">
    <div class="product-img"></div>
    <div class="product-info">
      <div class="product-name">有机棉织品</div>
      <div class="product-tag">棉麻系列</div>
    </div>
  </div>
  <div class="product">
    <div class="product-img" style="background:#4a6a55"></div>
    <div class="product-info">
      <div class="product-name">手工木制器</div>
      <div class="product-tag">原木系列</div>
    </div>
  </div>
  <div class="product">
    <div class="product-img" style="background:#5a7a65"></div>
    <div class="product-info">
      <div class="product-name">植物染面料</div>
      <div class="product-tag">草木染系列</div>
    </div>
  </div>
</div>
<div class="footer">配色方案 · 森浓</div>
</body>
</html>
