<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>茶花红 — 配色 Demo</title>
<style>
:root{--primary:#e72d48;--bg:#f1dddf;--card:#fff;--text:#5a3e36;--sub:#8a7068;--accent:#c9a96e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC',serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{background:var(--card);padding:20px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(0,0,0,.06)}
.nav-brand{font-size:1em;font-weight:600;color:var(--primary);letter-spacing:.1em}
.nav-link{font-size:.8em;color:var(--sub);text-decoration:none}
.hero{padding:80px 32px 60px;text-align:center;position:relative}
.hero::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:min(600px,100%);height:300px;background:linear-gradient(180deg,rgba(231,45,72,.08) 0%,transparent 100%);pointer-events:none}
.hero-eyebrow{font-size:.7em;letter-spacing:.2em;color:var(--sub);margin-bottom:20px;text-transform:uppercase}
.hero-title{font-size:clamp(2.4em,7vw,4em);font-weight:300;letter-spacing:.15em;line-height:1.2;margin-bottom:16px}
.hero-title span{color:var(--primary)}
.hero-sub{font-size:.9em;color:var(--sub);font-weight:300;letter-spacing:.05em;line-height:2;max-width:400px;margin:0 auto}
.hero-cta{display:inline-block;margin-top:32px;padding:12px 32px;background:var(--primary);color:#fff;text-decoration:none;border-radius:4px;font-size:.85em;letter-spacing:.1em;transition:opacity .2s}
.hero-cta:hover{opacity:.85}
.cards{padding:0 24px 80px;max-width:760px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.card{background:var(--card);border-radius:12px;padding:24px}
.card-icon{width:40px;height:40px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:1.2em}
.card-title{font-size:.9em;font-weight:600;margin-bottom:8px;letter-spacing:.05em}
.card-desc{font-size:.78em;color:var(--sub);line-height:1.7;font-weight:300}
.footer{padding:40px;text-align:center;font-size:.75em;color:var(--sub);border-top:1px solid rgba(0,0,0,.06);background:var(--card)}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-brand">茶花红</div>
  <a href="index.html" class="nav-link">← 返回</a>
</div>
<div class="hero">
  <div class="hero-eyebrow">产品介绍</div>
  <h1 class="hero-title">精致生活<br><span>由此开始</span></h1>
  <p class="hero-sub">为追求品质的用户打造，每一个细节都经过精心设计</p>
  <a href="#" class="hero-cta">了解更多</a>
</div>
<div class="cards">
  <div class="card">
    <div class="card-icon">✦</div>
    <div class="card-title">精选材质</div>
    <div class="card-desc">严选天然材料，从源头把控品质</div>
  </div>
  <div class="card">
    <div class="card-icon">✦</div>
    <div class="card-title">匠心工艺</div>
    <div class="card-desc">每一道工序都由经验工匠手工完成</div>
  </div>
  <div class="card">
    <div class="card-icon">✦</div>
    <div class="card-title">专属定制</div>
    <div class="card-desc">根据个人需求提供一对一定制服务</div>
  </div>
</div>
<div class="footer">配色方案 · 茶花红</div>
</body>
</html>
