<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无色 — 配色 Demo</title>
<style>
:root{--bg:#f5f5f3;--card:#fff;--text:#1a1a1a;--sub:#8a8a8a;--border:#e8e8e6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{background:var(--card);padding:24px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.nav-brand{font-size:.85em;font-weight:600;letter-spacing:.15em;text-transform:uppercase}
.nav-link{font-size:.8em;color:var(--sub);text-decoration:none}
.hero{padding:120px 32px;text-align:center;max-width:480px;margin:0 auto}
.hero-title{font-size:clamp(1.8em,5vw,2.6em);font-weight:300;letter-spacing:.1em;line-height:1.5;margin-bottom:24px}
.hero-sub{font-size:.85em;color:var(--sub);font-weight:300;letter-spacing:.03em;line-height:1.8}
.hero-price{font-size:2.4em;font-weight:300;margin-top:40px;letter-spacing:.05em}
.hero-price small{font-size:.35em;color:var(--sub)}
.features{padding:60px 24px;max-width:480px;margin:0 auto}
.feature{border-top:1px solid var(--border);padding:20px 0;display:flex;justify-content:space-between;align-items:center}
.feature-name{font-size:.85em;letter-spacing:.03em}
.feature-detail{font-size:.8em;color:var(--sub)}
.cta{padding:60px 32px;text-align:center}
.cta button{padding:14px 48px;background:var(--text);color:var(--bg);border:none;font-size:.85em;letter-spacing:.08em;cursor:pointer;border-radius:2px;transition:opacity .2s}
.cta button:hover{opacity:.7}
.footer{padding:40px;text-align:center;font-size:.72em;color:var(--sub);letter-spacing:.05em}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-brand">Aether</div>
  <a href="index.html" class="nav-link">← 返回</a>
</div>
<div class="hero">
  <h1 class="hero-title">形式追随功能<br>细节决定品质</h1>
  <p class="hero-sub">LESS IS MORE · 少即是多</p>
  <div class="hero-price">¥12,800 <small>起</small></div>
</div>
<div class="features">
  <div class="feature">
    <span class="feature-name">材质</span>
    <span class="feature-detail">意大利头层牛皮</span>
  </div>
  <div class="feature">
    <span class="feature-name">工艺</span>
    <span class="feature-detail">手工缝线</span>
  </div>
  <div class="feature">
    <span class="feature-name">产地</span>
    <span class="feature-detail">日本制</span>
  </div>
  <div class="feature">
    <span class="feature-name">交付</span>
    <span class="feature-detail">30 个工作日</span>
  </div>
</div>
<div class="cta"><button>立即咨询</button></div>
<div class="footer">Aether · 2026</div>
</body>
</html>
