<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深夜 — 配色 Demo</title>
<style>
:root{--bg:#0f1923;--card:#1a2840;--text:#e8f0f5;--sub:#6a8aaa;--primary:#a8c8d8;--accent:#e8885c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{background:rgba(15,25,35,.8);backdrop-filter:blur(10px);padding:16px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.04)}
.nav-brand{font-size:.9em;color:var(--primary);font-weight:600}
.nav-link{font-size:.8em;color:var(--sub);text-decoration:none}
.hero{padding:60px 32px 40px;max-width:560px;margin:0 auto}
.hero-title{font-size:clamp(1.6em,5vw,2.4em);font-weight:700;letter-spacing:-.01em;line-height:1.3;margin-bottom:16px}
.hero-sub{font-size:.85em;color:var(--sub);line-height:1.8;margin-bottom:32px}
.hero-search{display:flex;background:var(--card);border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.hero-search input{flex:1;padding:12px 16px;background:none;border:none;color:var(--text);font-size:.85em;outline:none}
.hero-search input::placeholder{color:var(--sub)}
.hero-search button{padding:12px 20px;background:var(--primary);color:var(--bg);border:none;font-size:.8em;font-weight:600;cursor:pointer}
.results{padding:20px 24px 80px;max-width:560px;margin:0 auto}
.result{background:var(--card);border-radius:8px;padding:14px 16px;margin-bottom:8px;border:1px solid rgba(255,255,255,.04);display:flex;justify-content:space-between;align-items:center}
.result-name{font-size:.85em;font-weight:600}
.result-tag{font-size:.68em;color:var(--accent);background:rgba(232,136,92,.1);padding:2px 8px;border-radius:10px}
.footer{padding:32px;text-align:center;font-size:.72em;color:var(--sub);border-top:1px solid rgba(255,255,255,.04)}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-brand">深夜搜索</div>
  <a href="index.html" class="nav-link">← 返回</a>
</div>
<div class="hero">
  <h1 class="hero-title">在深夜寻找<br>答案</h1>
  <p class="hero-sub">安静、专注、高效的搜索体验</p>
  <div class="hero-search">
    <input placeholder="搜索...">
    <button>搜索</button>
  </div>
</div>
<div class="results">
  <div class="result"><span class="result-name">深夜电台</span><span class="result-tag">播客</span></div>
  <div class="result"><span class="result-name">夜间阅读</span><span class="result-tag">阅读</span></div>
  <div class="result"><span class="result-name">代码编辑器</span><span class="result-tag">开发</span></div>
  <div class="result"><span class="result-name">音乐播放器</span><span class="result-tag">音乐</span></div>
</div>
<div class="footer">配色方案 · 深夜</div>
</body>
</html>
