<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大唐 — 配色 Demo</title>
<style>
:root{--primary:#8b4513;--bg:#fff8e7;--card:#fff8e7;--text:#3a2a1a;--sub:#8a7060;--accent:#c9a96e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC',serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{background:var(--card);padding:20px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(139,69,19,.15)}
.nav-brand{font-size:1em;color:var(--primary);letter-spacing:.1em;font-weight:600}
.nav-link{font-size:.8em;color:var(--sub);text-decoration:none}
.hero{padding:80px 32px;text-align:center;background:linear-gradient(180deg,rgba(201,169,110,.12) 0%,transparent 100%)}
.hero-title{font-size:clamp(2em,6vw,3em);font-weight:300;letter-spacing:.15em;margin-bottom:12px}
.hero-gold{color:var(--accent);font-weight:600}
.hero-sub{font-size:.85em;color:var(--sub);letter-spacing:.08em;line-height:2;max-width:360px;margin:0 auto}
.timeline{padding:60px 24px;max-width:560px;margin:0 auto}
.timeline-item{display:flex;gap:20px;padding-bottom:32px;position:relative}
.timeline-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px}
.timeline-content{flex:1}
.timeline-year{font-size:.72em;color:var(--accent);letter-spacing:.1em;margin-bottom:4px}
.timeline-title{font-size:.9em;font-weight:600;margin-bottom:4px}
.timeline-desc{font-size:.78em;color:var(--sub);line-height:1.7}
.footer{padding:40px;text-align:center;font-size:.75em;color:var(--sub);border-top:1px solid rgba(139,69,19,.1)}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-brand">大唐</div>
  <a href="index.html" class="nav-link">← 返回</a>
</div>
<div class="hero">
  <h1 class="hero-title">千年风华<span class="hero-gold"> ·</span><br>一脉相承</h1>
  <p class="hero-sub">追溯文明源头，探寻历史的厚重与美感</p>
</div>
<div class="timeline">
  <div class="timeline-item">
    <div class="timeline-dot"></div>
    <div class="timeline-content">
      <div class="timeline-year">唐 · 618-907</div>
      <div class="timeline-title">盛世华章</div>
      <div class="timeline-desc">万国来朝，文化璀璨，诗歌与艺术达到顶峰</div>
    </div>
  </div>
  <div class="timeline-item">
    <div class="timeline-dot"></div>
    <div class="timeline-content">
      <div class="timeline-year">宋 · 960-1279</div>
      <div class="timeline-title">文治时代</div>
      <div class="timeline-desc">文人雅士辈出，瓷器之美登峰造极</div>
    </div>
  </div>
  <div class="timeline-item">
    <div class="timeline-dot"></div>
    <div class="timeline-content">
      <div class="timeline-year">明 · 1368-1644</div>
      <div class="timeline-title">工艺巅峰</div>
      <div class="timeline-desc">家具、建筑、织锦，工艺美术全面发展</div>
    </div>
  </div>
</div>
<div class="footer">配色方案 · 大唐</div>
</body>
</html>
