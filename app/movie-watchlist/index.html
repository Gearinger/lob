*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f5;--card:#fff;--text:#2c2c2c;--sub:#888;--accent:#8B5A2B;

}
.dark{--bg:#1a1a1a;--card:#2d2d2d;--text:#e0e0e0;--sub:#888;--accent:#C47F17;--border:#444;--shadow:rgba(0,0,0,.3)}
body{font-family:'ZCOOL XiaoWei','PingFang SC',serif;background:var(--bg);color:var(--text);min-height:100vh;padding:60px 20px 80px;transition:background .3s,color .3s}
.header{text-align:center;margin-bottom:24px;position:relative}
.title{font-family:'Ma Shan Zheng',cursive;font-size:2.5em;letter-spacing:4px;text-shadow:2px 2px 0 var(--border)}
.btn{padding:8px 16px;border:2px solid var(--text);border-radius:20px;background:var(--card);color:var(--text);font-family:inherit;font-size:.82em;cursor:pointer;box-shadow:2px 2px 0 var(--text);transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn:hover{box-shadow:1px 1px 0 var(--text);transform:translateY(-1px)}
.btn.active{background:var(--text);color:var(--bg)}
.search-wrap{text-align:center;margin-bottom:28px;max-width:560px;margin-left:auto;margin-right:auto;position:relative}
.search-input{width:100%;padding:12px 20px;border:2px solid var(--text);border-radius:12px;font-family:inherit;font-size:1em;background:var(--card);color:var(--text);outline:none;box-shadow:3px 4px 0 var(--text);transition:box-shadow .2s}
.search-input:focus{box-shadow:2px 2px 0 var(--text)}
.search-count{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:.78em;color:var(--sub);pointer-events:none}
.filters{display:flex;justify-content:center;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;background:var(--card);color:var(--sub);font-family:inherit;font-size:.78em;cursor:pointer;transition:all .15s}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent)}
.director-group{margin-bottom:32px}
.director-name{font-family:'Ma Shan Zheng',cursive;font-size:1.4em;color:var(--accent);letter-spacing:2px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px dashed var(--border);cursor:pointer;display:flex;align-items:center;gap:8px}
.director-name:hover{color:#C47F17}
.director-name .toggle{font-size:.7em;transition:transform .2s;margin-right:8px}
.director-name.collapsed .toggle{transform:rotate(-90deg)}
.director-count{font-size:.6em;color:var(--sub);font-family:'PingFang SC',sans-serif;font-weight:400}
.movie-list{display:grid;gap:8px}
.movie-list.hidden{display:none}
.movie-item{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--card);border-radius:10px;box-shadow:0 2px 8px var(--shadow);transition:transform .15s,box-shadow .15s;cursor:pointer;border:1.5px solid transparent}
.movie-item:hover{transform:translateX(4px);box-shadow:0 4px 12px var(--shadow)}
.movie-item.watched{opacity:.5}
.movie-item.watched .movie-title{text-decoration:line-through}
.movie-item.expanded{border-color:var(--accent);flex-direction:column;align-items:flex-start;gap:8px}
.movie-checkbox{width:20px;height:20px;border:2px solid #ccc;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px;color:#fff}
.movie-item.watched .movie-checkbox{background:var(--progress);border-color:var(--progress)}
.movie-title{font-size:.95em;flex:1}
.movie-director{font-size:.78em;color:var(--sub);flex-shrink:0}
.movie-detail{display:none;width:100%;padding:12px 0 4px;border-top:1px dashed var(--border);font-size:.82em;color:var(--sub);line-height:1.7}
.movie-item.expanded .movie-detail{display:block}
.video-links{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.video-link{padding:6px 12px;border-radius:8px;font-size:.78em;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:opacity .15s}
.video-link:hover{opacity:.8}
.bilibili{background:#00A1D6;color:#fff}
.youtube{background:#FF0000;color:#fff}
.netflix{background:#E50914;color:#fff}
.douban{background:#07C160;color:#fff}
.progress-bar{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,var(--tag),var(--progress));z-index:101;transition:width .3s}
.topnav{position:fixed;top:0;left:0;right:0;height:48px;background:var(--card);border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;box-shadow:0 2px 8px var(--shadow)}
.nav-left{display:flex;align-items:center;gap:10px}
.nav-right{display:flex;align-items:center;gap:8px}
.sync-dot{font-size:.82em;cursor:default;transition:color .3s}
.sync-ok{color:#27AE60}
.sync-err{color:#E74C3C}
.sync-syncing{color:#27AE60;opacity:.5}
.nav-back{background:var(--card);border:1.5px solid var(--text);border-radius:20px;padding:5px 14px;font-size:.82em;color:var(--text);text-decoration:none;box-shadow:2px 2px 0 var(--text);transition:all .15s;flex-shrink:0}
.nav-back:hover{box-shadow:1px 1px 0 var(--text);transform:translateY(-1px)}
.nav-progress{font-size:.82em;color:var(--sub);white-space:nowrap}
.nav-theme{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--text);background:var(--card);color:var(--text);font-size:1.1em;cursor:pointer;box-shadow:2px 2px 0 var(--text);transition:all .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nav-theme:hover,.nav-back:hover{box-shadow:1px 1px 0 var(--text);transform:translateY(-1px)}
.nav-btn{background:var(--card);border:1.5px solid var(--text);border-radius:20px;padding:5px 14px;font-size:.82em;color:var(--text);cursor:pointer;box-shadow:2px 2px 0 var(--text);transition:all .15s;flex-shrink:0}
.nav-btn:hover{box-shadow:1px 1px 0 var(--text);transform:translateY(-1px)}
@media(max-width:600px){
  body{padding:60px 12px 60px}
  .movie-director{display:none}
  .topnav{padding:0 12px}
  .nav-progress{font-size:.78em}
  .nav-back{font-size:.75em;padding:4px 10px}
}
</style>

<script>
(function() {
  var container = document.getElementById('movieList');
  var searchInput = document.getElementById('searchInput');
  var searchCount = document.getElementById('searchCount');
  var progressBar = document.getElementById('progressBar');
  var progressLabel = document.getElementById('progressLabel');
  var themeBtn = document.getElementById('themeBtn');

  var randomBtn = document.getElementById('randomBtn');
  var filterBtns = document.querySelectorAll('.filter-btn');

  var STORAGE_KEY = 'hermy-movies-v2';
  var watched = {};
  try { watched = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}

  // Supabase sync
  var SB_URL = 'https://biehvpylfhoespllmija.supabase.co';
  var SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpZWh2cHlsZmhvZXNwbGxtaWphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzQ0MzQsImV4cCI6MjA5MTUxMDQzNH0.B3kjktOGp7YT-ZwIRRP3IHLPKBIo1UawJdCJlkWsbf4';
  var SB_USER = 'hermy';
  var syncStatus = 'ok'; // 'ok' | 'syncing' | 'err'

  function sbFetch(path, method, body) {
    return fetch(SB_URL + '/rest/v1/' + path, {
      method: method || 'GET',
      headers: {
        'apikey': SB_ANON,
        'Authorization': 'Bearer ' + SB_ANON,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: body ? JSON.stringify(body) : undefined
    });
  }

  async function syncToCloud() {
    var dot = document.getElementById('syncDot');
    syncStatus = 'syncing';
    dot.className = 'sync-dot sync-syncing';
    try {
      var up = await fetch(SB_URL + '/rest/v1/movie_watch_progress', {
        method: 'POST',
        headers: { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify([{ user_id: SB_USER, watched_map: watched, last_synced_at: new Date().toISOString(), updated_at: new Date().toISOString() }])
      });
      if (up.ok) {
        syncStatus = 'ok';
        dot.className = 'sync-dot sync-ok';
      } else {
        syncStatus = 'err';
        dot.className = 'sync-dot sync-err';
        console.error('sync error', await up.text());
      }
    } catch(e) {
      syncStatus = 'err';
      dot.className = 'sync-dot sync-err';
      console.error('sync exception', e);
    }
  }

  async function loadFromCloud() {
    try {
      var res = await sbFetch('movie_watch_progress?user_id=eq.' + SB_USER + '&select=*', 'GET');
      if (res.ok) {
        var data = await res.json();
        if (data && data.length > 0 && data[0].watched_map) {
          watched = data[0].watched_map;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(watched));
          return true;
        }
      }
    } catch(e) { console.error('loadFromCloud error', e); }
    return false;
  }



  var currentFilter = 'all';
  var expandedIdx = null;

  // Group by director
  var byDirector = {};
  movies.forEach(function(film, i) {
    film._idx = i;
    if (!byDirector[film.director]) byDirector[film.director] = [];
    byDirector[film.director].push(film);
  });

  // Dark mode
  var isDark = localStorage.getItem('movie-theme-dark') === '1';
  if (isDark) document.documentElement.classList.add('dark');
  themeBtn.textContent = isDark ? '☀️' : '🌙';
  themeBtn.onclick = function() {
    isDark = !isDark;
    document.documentElement.classList.toggle('dark', isDark);
    localStorage.setItem('movie-theme-dark', isDark ? '1' : '0');
    themeBtn.textContent = isDark ? '☀️' : '🌙';
  };

  function getVideoLinks(title, director) {
    var q = encodeURIComponent(title + ' ' + director);
    return '<div class="video-links">' +
      '<a class="video-link bilibili" href="https://search.bilibili.com/all?keyword=' + q + '" target="_blank" rel="noopener">📺 B站</a>' +
      '<a class="video-link youtube" href="https://www.youtube.com/results?search_query=' + q + '" target="_blank" rel="noopener">▶️ YouTube</a>' +
      '<a class="video-link douban" href="https://movie.douban.com/subject_search?search_text=' + q + '" target="_blank" rel="noopener">🎯 豆瓣</a>' +
      '</div>';
  }

  function render(list) {
    container.innerHTML = '';
    list.forEach(function(entry) {
      var director = entry[0];
      var films = entry[1];
      var group = document.createElement('div');
      group.className = 'director-group';
      
      var nameEl = document.createElement('div');
      nameEl.className = 'director-name';
      nameEl.innerHTML = '<span class="toggle">▼</span> ' + director + ' <span class="director-count">(' + films.length + '部)</span>';
      nameEl.onclick = function() {
        nameEl.classList.toggle('collapsed');
        nameEl.nextElementSibling.classList.toggle('hidden');
      };
      
      var listEl = document.createElement('div');
      listEl.className = 'movie-list';
      
      films.forEach(function(film) {
        var item = document.createElement('div');
        var isWatched = !!watched[film._idx];
        item.className = 'movie-item' + (isWatched ? ' watched' : '');
        item.dataset.idx = film._idx;
        
        var q = encodeURIComponent(film.title);
        item.innerHTML = 
          '<div class="movie-checkbox">' + (isWatched ? '✓' : '') + '</div>' +
          '<span class="movie-title">' + film.title + '</span>' +
          '<span class="movie-director">' + film.director + '</span>' +
          '<div class="movie-detail">' +
            '<div>📅 数据来源：豆瓣四叔片单 · 248部导演系必看</div>' +
            '<div>🎭 导演：' + film.director + '</div>' +
            getVideoLinks(film.title, film.director) +
          '</div>';
        
        item.onclick = function(e) {
          // Toggle watched on checkbox click
          if (e.target.classList.contains('movie-checkbox') || e.target.closest('.movie-checkbox')) {
            watched[film._idx] = !watched[film._idx];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(watched));
            item.classList.toggle('watched', watched[film._idx]);
            item.querySelector('.movie-checkbox').textContent = watched[film._idx] ? '✓' : '';
            updateProgress();
            syncToCloud();
            return;
          }
          // Toggle expand on title click
          if (expandedIdx === film._idx) {
            item.classList.remove('expanded');
            expandedIdx = null;
          } else {
            // Collapse previous
            if (expandedIdx !== null) {
              var prev = container.querySelector('[data-idx="' + expandedIdx + '"]');
              if (prev) prev.classList.remove('expanded');
            }
            item.classList.add('expanded');
            expandedIdx = film._idx;
          }
        };
        
        listEl.appendChild(item);
      });
      
      group.appendChild(nameEl);
      group.appendChild(listEl);
      container.appendChild(group);
    });
  }

  function updateProgress() {
    var watchedCount = Object.values(watched).filter(Boolean).length;
    var pct = 248 ? Math.round(watchedCount / 248 * 100) : 0;
    progressBar.style.width = pct + '%';
    progressLabel.textContent = watchedCount + '/' + 248 + ' (' + pct + '%)';
    var unwatchedCount = 248 - watchedCount;
    var allEl = document.getElementById('countAll');
    var unwatchedEl = document.getElementById('countUnwatched');
    var watchedEl = document.getElementById('countWatched');
    if (allEl) allEl.textContent = 248;
    if (unwatchedEl) unwatchedEl.textContent = unwatchedCount;
    if (watchedEl) watchedEl.textContent = watchedCount;
  }

  // Search
  searchInput.oninput = function() {
    var q = this.value.trim().toLowerCase();
    if (!q) { render(getFilteredList()); searchCount.textContent = ''; return; }
    var results = [];
    Object.entries(byDirector).forEach(function(entry) {
      entry[1].forEach(function(film) {
        if (film.title.toLowerCase().includes(q) || film.director.toLowerCase().includes(q)) {
          results.push([entry[0], [film]]);
        }
      });
    });
    render(results);
    searchCount.textContent = results.reduce(function(s, e) { return s + e[1].length; }, 0) + ' 部';
  };

  // Filters
  function getFilteredList() {
    var entries = Object.entries(byDirector);
    if (currentFilter === 'unwatched') {
      return entries.map(function(e) { return [e[0], e[1].filter(function(f) { return !watched[f._idx]; })]; }).filter(function(e) { return e[1].length > 0; });
    }
    if (currentFilter === 'watched') {
      return entries.map(function(e) { return [e[0], e[1].filter(function(f) { return watched[f._idx]; })]; }).filter(function(e) { return e[1].length > 0; });
    }
    return entries;
  }

  filterBtns.forEach(function(btn) {
    btn.onclick = function() {
      filterBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render(getFilteredList());
    };
  });

  // Random
  randomBtn.onclick = function() {
    var unwatched = movies.filter(function(f) { return !watched[f._idx]; });
    if (unwatched.length === 0) { alert('已全部看完！🎉'); return; }
    var pick = unwatched[Math.floor(Math.random() * unwatched.length)];
    alert('🎲 今日推荐：' + pick.title + ' —— ' + pick.director);
    // Scroll to it
    var el = container.querySelector('[data-idx="' + pick._idx + '"]');
    if (el) { el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('expanded'); expandedIdx = pick._idx; }
  };

  updateProgress();
  render(getFilteredList());
  // Load from cloud on startup (localStorage already has data, cloud will override if newer)
  loadFromCloud().then(function(loaded) {
    if (loaded) { updateProgress(); render(getFilteredList()); }
  });
})();
</script>
