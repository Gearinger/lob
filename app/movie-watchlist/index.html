const container = document.getElementById('movieList');
const searchInput = document.getElementById('searchInput');
const searchCount = document.getElementById('searchCount');
const progressBar = document.getElementById('progressBar');
const progressLabel = document.getElementById('progressLabel');

let watched = {};
try { watched = JSON.parse(localStorage.getItem('hermy-movies-watched') || '{}'); } catch(e) {}

// Group by director
const byDirector = {};
movies.forEach((film, i) => {
  const d = film.director;
  if (!byDirector[d]) byDirector[d] = [];
  film._idx = i;
  byDirector[d].push(film);
});

// Render
function render(list) {
  container.innerHTML = '';
  list.forEach(([director, films]) => {
    const group = document.createElement('div');
    group.className = 'director-group';

    const nameEl = document.createElement('div');
    nameEl.className = 'director-name';
    nameEl.innerHTML = `<span class="toggle">▼</span> ${director} <span class="director-count">(${films.length}部)</span>`;
    nameEl.addEventListener('click', () => {
      nameEl.classList.toggle('collapsed');
      listEl.classList.toggle('hidden');
    });

    const listEl = document.createElement('div');
    listEl.className = 'movie-list';

    films.forEach((film, fi) => {
      const item = document.createElement('div');
      item.className = 'movie-item' + (watched[film._idx] ? ' watched' : '');
      item.dataset.idx = film._idx;
      item.innerHTML = `
        <div class="movie-checkbox">${watched[film._idx] ? '✓' : ''}</div>
        <span class="movie-title">${film.title}</span>
        <span class="movie-director">${film.director}</span>
      `;
      item.addEventListener('click', () => {
        watched[film._idx] = !watched[film._idx];
        localStorage.setItem('hermy-movies-watched', JSON.stringify(watched));
        item.classList.toggle('watched', watched[film._idx]);
        item.querySelector('.movie-checkbox').textContent = watched[film._idx] ? '✓' : '';
        updateProgress();
      });
      listEl.appendChild(item);
    });

    group.appendChild(nameEl);
    group.appendChild(listEl);
    container.appendChild(group);
  });
}

// Search
function doSearch(q) {
  if (!q) {
    render(Object.entries(byDirector).sort());
    searchCount.textContent = '';
    return;
  }
  q = q.toLowerCase();
  const results = [];
  Object.entries(byDirector).forEach(([director, films]) => {
    films.forEach(film => {
      if (film.title.toLowerCase().includes(q) || film.director.toLowerCase().includes(q)) {
        results.push([director, [film]]);
      }
    });
  });
  render(results);
  searchCount.textContent = `${results.reduce((s,[,f]) => s + f.length, 0)} 部`;
}

searchInput.addEventListener('input', (e) => doSearch(e.target.value.trim()));

// Progress
function updateProgress() {
  const watchedCount = Object.values(watched).filter(Boolean).length;
  const pct = total ? Math.round(watchedCount / total * 100) : 0;
  progressBar.style.width = pct + '%';
  progressLabel.textContent = `${watchedCount}/${total} (${pct}%)`;
}

updateProgress();

// Initial render
render(Object.entries(byDirector).sort());
</script>
