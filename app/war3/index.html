<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>战三国</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'ZCOOL XiaoWei','PingFang SC',serif;background:#1a1208;color:#f5e6c8;min-height:100vh;overflow:hidden;user-select:none}
canvas{position:fixed;inset:0;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);z-index:10;pointer-events:none}
.title{font-size:1.2em;letter-spacing:.2em;color:#c9a96e;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.score{display:flex;gap:24px;font-size:.9em}
.score span{color:#c9a96e}
#bottom{position:fixed;bottom:0;left:0;right:0;padding:12px 20px;display:flex;justify-content:center;gap:16px;z-index:10;background:linear-gradient(0deg,rgba(0,0,0,.6),transparent)}
.btn{padding:10px 28px;border:1.5px solid #c9a96e;background:rgba(201,169,110,.1);color:#c9a96e;border-radius:4px;font-family:inherit;font-size:.9em;cursor:pointer;letter-spacing:.1em;transition:all .2s}
.btn:hover{background:rgba(201,169,110,.25)}
.btn:active{transform:scale(.97)}
#status{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.4em;color:#c9a96e;letter-spacing:.2em;text-shadow:0 2px 12px rgba(0,0,0,.8);pointer-events:none;z-index:20;opacity:0;transition:opacity .5s}
#status.show{opacity:1}
#info{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);font-size:.72em;color:rgba(201,169,110,.5);letter-spacing:.05em;pointer-events:none;z-index:10}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="title">战三国</div>
  <div class="score">
    <span>魏 <b id="scoreL">0</b></span>
    <span>蜀 <b id="scoreR">0</b></span>
  </div>
</div>
<div id="status" id="status"></div>
<div id="info">点击开战 · 兵种相克：枪克骑、骑克步、步克枪</div>
<div id="bottom">
  <button class="btn" onclick="reset()">重置阵型</button>
  <button class="btn" onclick="startBattle()">开战</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

const TROOP_TYPES = {
  SPEAR:  { name:'枪兵', color:'#5b9bd5', atk:35, hp:180, speed:1.2, atkSpeed:1.0, range:28, size:9,  icon:'戈', advantage:'CAV' },
  CAV:    { name:'骑兵', color:'#c9522a', atk:28, hp:140, speed:2.2, atkSpeed:0.9, range:22, size:11, icon:'骑', advantage:'INF' },
  INF:    { name:'步兵', color:'#70ad47', atk:22, hp:220, speed:1.0, atkSpeed:1.1, range:24, size:9,  icon:'步', advantage:'SPEAR' },
  ARCHER: { name:'弓兵', color:'#9e6ab8', atk:40, hp:90,  speed:0.8, atkSpeed:1.2, range:120,size:8,  icon:'弓', advantage:null },
  GENERAL:{ name:'主将', color:'#ffd700', atk:45, hp:600, speed:1.5, atkSpeed:0.8, range:30, size:14, icon:'将', advantage:null }
};

const MATCHUP = { SPEAR:'CAV', CAV:'INF', INF:'SPEAR' };
const MATCHUP_NAMES = { SPEAR:'枪克骑', CAV:'骑克步', INF:'步克枪' };

let units = [];
let battleState = 'idle'; // idle | running | over
let scores = { L: 0, R: 0 };
let battleTime = 0;
let particles = [];
let lastTime = 0;

const CONFIG = {
  spawnY: 0.25,
  spacingX: 45,
  spacingY: 40,
  cols: 4,
  rows: 4,
};

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Unit class
class Unit {
  constructor(side, type, col, row) {
    this.side = side; // 'L' or 'R'
    this.type = type;
    const cfg = TROOP_TYPES[type];
    this.hp = cfg.hp;
    this.maxHp = cfg.hp;
    this.atk = cfg.atk;
    this.speed = cfg.speed;
    this.atkSpeed = cfg.atkSpeed;
    this.range = cfg.range;
    this.size = cfg.size;
    this.color = cfg.color;
    this.icon = cfg.icon;

    this.x = 0;
    this.y = 0;
    this.target = null;
    this.atkCooldown = 0;
    this.dead = false;
    this.col = col;
    this.row = row;
    this.vx = 0;
    this.vy = 0;
    this.anim = Math.random() * Math.PI * 2;
    this.hitFlash = 0;

    this._setPos(col, row);
  }

  _setPos(col, row) {
    const battleCenterX = W * 0.5;
    const spawnY = H * CONFIG.spawnY;
    if (this.side === 'L') {
      this.x = battleCenterX - (CONFIG.cols - col) * CONFIG.spacingX;
    } else {
      this.x = battleCenterX + (col + 1) * CONFIG.spacingX;
    }
    this.y = spawnY + (row - CONFIG.rows / 2 + 0.5) * CONFIG.spacingY;
  }

  update(dt) {
    if (this.dead) return;
    this.anim += dt * 3;
    if (this.hitFlash > 0) this.hitFlash -= dt * 5;
    if (this.atkCooldown > 0) this.atkCooldown -= dt;

    // Find target
    if (!this.target || this.target.dead) {
      this.target = this._findTarget();
    }

    if (this.target) {
      const dx = this.target.x - this.x;
      const dy = this.target.y - this.y;
      const dist = Math.hypot(dx, dy);

      if (dist <= this.range) {
        // In range: attack
        this.vx *= 0.8;
        this.vy *= 0.8;
        if (this.atkCooldown <= 0) {
          this._attack(this.target);
          this.atkCooldown = 1 / this.atkSpeed;
        }
      } else {
        // Move toward target
        const spd = this.speed * 60 * dt;
        this.vx = (dx / dist) * spd;
        this.vy = (dy / dist) * spd;
        this.x += this.vx;
        this.y += this.vy;
      }
    } else {
      // No target: move forward
      const spd = this.speed * 50 * dt;
      this.vx = this.side === 'L' ? spd : -spd;
      this.vy *= 0.9;
      this.x += this.vx;
      this.y += this.vy;
    }
  }

  _findTarget() {
    let best = null;
    let bestScore = Infinity;
    for (const u of units) {
      if (u.side === this.side || u.dead) continue;
      // Matchup bonus
      let score = Math.hypot(u.x - this.x, u.y - this.y);
      if (MATCHUP[this.type] === u.type) score *= 0.5;
      if (score < bestScore) { bestScore = score; best = u; }
    }
    return best;
  }

  _attack(target) {
    // Calculate damage
    let dmg = this.atk;
    if (MATCHUP[this.type] === target.type) dmg *= 1.5;
    dmg = Math.round(dmg * (0.85 + Math.random() * 0.3));
    target.hp -= dmg;
    target.hitFlash = 1;

    // Hit effect
    spawnHit(target.x, target.y, dmg, this.side === 'L');

    // Knockback
    const angle = Math.atan2(target.y - this.y, target.x - this.x);
    target.x += Math.cos(angle) * 3;
    target.y += Math.sin(angle) * 3;

    if (target.hp <= 0) {
      target.dead = true;
      spawnDeath(target.x, target.y, target.color);
      spawnHit(target.x, target.y, '击杀!', this.side === 'L');
    }
  }

  draw() {
    if (this.dead) return;
    const pulse = 1 + Math.sin(this.anim) * 0.05;
    const s = this.size * pulse;

    // Glow
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 8;

    // Body
    ctx.fillStyle = this.hitFlash > 0 ? '#fff' : this.color;
    ctx.beginPath();
    if (this.side === 'L') {
      ctx.moveTo(this.x + s, this.y);
      ctx.lineTo(this.x - s * 0.6, this.y - s * 0.8);
      ctx.lineTo(this.x - s * 0.6, this.y + s * 0.8);
    } else {
      ctx.moveTo(this.x - s, this.y);
      ctx.lineTo(this.x + s * 0.6, this.y - s * 0.8);
      ctx.lineTo(this.x + s * 0.6, this.y + s * 0.8);
    }
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // HP bar
    const barW = 24;
    const barH = 3;
    const hpPct = Math.max(0, this.hp / this.maxHp);
    ctx.fillStyle = 'rgba(0,0,0,.5)';
    ctx.fillRect(this.x - barW/2, this.y - s - 8, barW, barH);
    ctx.fillStyle = hpPct > 0.5 ? '#4caf50' : hpPct > 0.25 ? '#ff9800' : '#f44336';
    ctx.fillRect(this.x - barW/2, this.y - s - 8, barW * hpPct, barH);

    // Label
    ctx.fillStyle = 'rgba(201,169,110,.6)';
    ctx.font = '9px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(TROOP_TYPES[this.type].name, this.x, this.y + s + 10);
  }
}

// Particles
function spawnHit(x, y, text, isLeft) {
  particles.push({
    x, y, vy: -1.5, life: 1,
    text: String(text),
    color: isLeft ? '#5b9bd5' : '#c9522a',
    size: text === '击杀!' ? 14 : 11
  });
}

function spawnDeath(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const a = (Math.PI * 2 * i) / 8;
    particles.push({
      x, y,
      vx: Math.cos(a) * (2 + Math.random() * 2),
      vy: Math.sin(a) * (2 + Math.random() * 2),
      life: 1, color, size: 3 + Math.random() * 3
    });
  }
}

// Formation presets
const FORMATIONS = {
  standard: [
    ['GENERAL','INF','SPEAR','ARCHER'],
    ['INF','CAV','INF','ARCHER'],
    ['SPEAR','INF','CAV',null],
    [null,'SPEAR','INF',null],
  ],
  rush: [
    ['CAV','CAV','CAV','CAV'],
    ['INF','CAV','CAV',null],
    [null,'INF','INF',null],
    [null,null,'SPEAR',null],
  ],
  archer: [
    ['ARCHER','ARCHER','ARCHER','ARCHER'],
    ['INF','INF','INF','INF'],
    ['SPEAR','SPEAR','SPEAR','SPEAR'],
    [null,null,null,null],
  ],
};

function spawnArmy(side, formation) {
  const keys = Object.keys(FORMATIONS);
  const f = FORMATION_TYPES[formation] || FORMATIONS[keys[Math.floor(Math.random() * keys.length)]];
  const rows = f.length;
  const cols = f[0].length;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const t = f[r][c];
      if (t) units.push(new Unit(side, t, c, r));
    }
  }
}

function startBattle() {
  if (battleState === 'running') return;
  battleState = 'running';
  showStatus('开战');
  setTimeout(() => hideStatus(), 1500);
}

function reset() {
  battleState = 'idle';
  units = [];
  particles = [];
  scores = { L: 0, R: 0 };
  document.getElementById('scoreL').textContent = '0';
  document.getElementById('scoreR').textContent = '0';
  spawnArmy('L', 'standard');
  spawnArmy('R', 'standard');
  updateCount();
}

function showStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.add('show');
}
function hideStatus() {
  document.getElementById('status').classList.remove('show');
}

function updateCount() {
  const lAlive = units.filter(u => u.side === 'L' && !u.dead).length;
  const rAlive = units.filter(u => u.side === 'R' && !u.dead).length;
  document.getElementById('scoreL').textContent = lAlive;
  document.getElementById('scoreR').textContent = rAlive;
}

// Draw background
function drawBG() {
  ctx.fillStyle = '#0d0a05';
  ctx.fillRect(0, 0, W, H);

  // Ground gradient
  const gy = H * 0.3;
  const gh = H * 0.4;
  const grd = ctx.createLinearGradient(0, gy, 0, gy + gh);
  grd.addColorStop(0, 'rgba(60,40,20,0)');
  grd.addColorStop(0.3, 'rgba(80,55,25,0.15)');
  grd.addColorStop(1, 'rgba(60,40,20,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, gy, W, gh);

  // Center line
  ctx.strokeStyle = 'rgba(201,169,110,.08)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 8]);
  ctx.beginPath();
  ctx.moveTo(W/2, H * 0.15);
  ctx.lineTo(W/2, H * 0.85);
  ctx.stroke();
  ctx.setLineDash([]);

  // Labels
  ctx.fillStyle = 'rgba(201,169,110,.12)';
  ctx.font = `${Math.min(W, H) * 0.08}px serif`;
  ctx.textAlign = 'center';
  ctx.fillText('魏', W * 0.2, H * 0.15);
  ctx.fillText('蜀', W * 0.8, H * 0.15);
}

// Main loop
function update(dt) {
  if (battleState !== 'running') return;

  battleTime += dt;
  const living = { L: 0, R: 0 };

  for (const u of units) {
    u.update(dt);
    if (!u.dead) living[u.side]++;
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += (p.vx || 0);
    p.y += p.vy;
    if (p.vy !== undefined) p.vy += 0.05;
    p.life -= dt * 1.5;
    if (p.life <= 0) particles.splice(i, 1);
  }

  updateCount();

  // Check win
  if (living.L === 0 || living.R === 0) {
    battleState = 'over';
    const winner = living.L > 0 ? '魏军获胜' : '蜀军获胜';
    showStatus(winner);
  }
}

function draw() {
  drawBG();

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    if (p.text !== undefined) {
      ctx.fillStyle = p.color;
      ctx.font = `bold ${p.size}px system-ui`;
      ctx.textAlign = 'center';
      ctx.fillText(p.text, p.x, p.y);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // Units
  for (const u of units) u.draw();
}

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// Matchup legend
const FORMATION_TYPES = {
  standard: [
    ['GENERAL','INF','SPEAR','ARCHER'],
    ['INF','CAV','INF','ARCHER'],
    ['SPEAR','INF','CAV',null],
    [null,'SPEAR','INF',null],
  ],
  rush: [
    ['CAV','CAV','CAV','CAV'],
    ['INF','CAV','CAV',null],
    [null,'INF','INF',null],
    [null,null,'SPEAR',null],
  ],
  archer: [
    ['ARCHER','ARCHER','ARCHER','ARCHER'],
    ['INF','INF','INF','INF'],
    ['SPEAR','SPEAR','SPEAR','SPEAR'],
    [null,null,null,null],
  ],
  mixed: [
    ['GENERAL','ARCHER','ARCHER','CAV'],
    ['INF','CAV','INF','SPEAR'],
    ['SPEAR','INF','CAV',null],
    [null,null,null,null],
  ],
};

reset();
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
