<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>方块躲弹幕 🟥</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:system-ui,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;touch-action:none}
canvas{position:fixed;top:0;left:0}
#ui{position:fixed;top:0;left:0;right:0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;z-index:10;pointer-events:none}
.score{font-size:2em;font-weight:700;letter-spacing:2px;text-shadow:0 0 20px rgba(255,100,100,.8)}
.level{font-size:1em;color:#888}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20}
#overlay h1{font-size:3em;margin-bottom:8px;text-shadow:0 0 30px rgba(255,80,80,.6)}
#overlay .sub{font-size:1.1em;color:#aaa;margin-bottom:32px;text-align:center;line-height:1.7}
#overlay .hint{font-size:.85em;color:#555;margin-top:24px}
.btn{padding:14px 40px;font-size:1.2em;border:2px solid #fff;border-radius:8px;background:transparent;color:#fff;cursor:pointer;transition:all .2s;margin-top:8px}
.btn:hover{background:#fff;color:#000}
#gameover{text-align:center}
#gameover h2{font-size:2.5em;color:#ff4444;text-shadow:0 0 30px rgba(255,50,50,.5);margin-bottom:16px}
#gameover .final{font-size:5em;font-weight:700;margin:16px 0;color:#fff;text-shadow:0 0 20px rgba(255,255,255,.3)}
#gameover .best{font-size:1em;color:#888;margin-bottom:8px}
.hidden{display:none!important}
#powerup-info{position:fixed;bottom:16px;left:0;right:0;text-align:center;font-size:.8em;color:#888;z-index:10;pointer-events:none}
</style>
</head>
<body>

<div id="ui">
  <div class="level" id="levelText">波次 1</div>
  <div class="score" id="scoreText">0</div>
</div>

<div id="overlay">
  <h1>🟥 躲弹幕</h1>
  <div class="sub">你是红色方块<br>弹幕从四面八方涌来<br>躲开它们，活得越久越强</div>
  <button class="btn" id="startBtn">开始</button>
  <div class="hint">WASD / 方向键 或 手机滑动</div>
</div>

<div id="gameover" class="hidden">
  <h2>GAME OVER</h2>
  <div class="final" id="finalScore">0</div>
  <div class="best">最高分: <span id="bestScore">0</span></div>
  <button class="btn" id="retryBtn">再来一局</button>
</div>

<div id="powerup-info" id="powerupInfo"></div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// State
let state = 'menu'; // menu | playing | gameover
let score = 0;
let wave = 1;
let best = +localStorage.getItem('dodge-best') || 0;
let tick = 0;

// Player
let player = { x: 0, y: 0, size: 14, power: 1, bullets: [], invTimer: 0, trail: [] };

// Bullets & Particles
let bullets = [];
let particles = [];
let powerups = [];

// Controls
let keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.key] = false);

// Touch
let touchStart = null;
let touchDelta = { x: 0, y: 0 };
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touchStart) {
    touchDelta.x = e.touches[0].clientX - touchStart.x;
    touchDelta.y = e.touches[0].clientY - touchStart.y;
  }
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchStart = null;
  touchDelta.x = 0;
  touchDelta.y = 0;
});

// Movement
function movePlayer() {
  const spd = 4;
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;
  if (touchDelta.x < -10) dx = -1;
  if (touchDelta.x >  10) dx =  1;
  if (touchDelta.y < -10) dy = -1;
  if (touchDelta.y >  10) dy =  1;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  player.x = Math.max(player.size, Math.min(W - player.size, player.x + dx * spd));
  player.y = Math.max(player.size, Math.min(H - player.size, player.y + dy * spd));

  // Trail
  player.trail.push({ x: player.x, y: player.y, a: 1 });
  if (player.trail.length > 12) player.trail.shift();
}

// Bullets
function shoot(angle, spd, color) {
  bullets.push({
    x: player.x, y: player.y,
    vx: Math.cos(angle) * spd,
    vy: Math.sin(angle) * spd,
    size: 5,
    color,
    power: 1,
    fromPlayer: true,
  });
}

function spawnEnemyBullet(x, y, vx, vy, color) {
  bullets.push({ x, y, vx, vy, size: 4, color, power: 1, fromPlayer: false });
}

// Particles
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 1 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, life: 1, color, size: 2 + Math.random() * 3 });
  }
}

// Wave spawning
let spawnTimer = 0;
let spawnInterval = 60;

function spawnWave() {
  const nBullets = 3 + Math.floor(wave * 1.5);
  const angleStep = (Math.PI * 2) / nBullets;
  const baseAngle = (tick * 0.02) + wave * 0.3;
  const spd = 1.5 + wave * 0.2 + Math.random() * 1;
  const R = Math.max(W, H) * 0.8;

  for (let i = 0; i < nBullets; i++) {
    const a = baseAngle + angleStep * i + (Math.random() - 0.5) * 0.3;
    // Spawn at screen edge, fly toward player's current position
    const bx = player.x + Math.cos(a) * (Math.max(W, H) * 0.9);
    const by = player.y + Math.sin(a) * (Math.max(W, H) * 0.9);
    spawnEnemyBullet(bx, by,
      -Math.cos(a) * spd,
      -Math.sin(a) * spd,
      `hsl(${30 + wave * 10}, 80%, ${50 + wave * 3}%)`
    );
  }

  // Occasionally spawn a powerup
  if (Math.random() < 0.15) {
    const types = ['heal', 'power', 'speed', 'multishot'];
    powerups.push({
      x: player.x + (Math.random() - 0.5) * 200,
      y: player.y + (Math.random() - 0.5) * 200,
      type: types[Math.floor(Math.random() * types.length)],
      age: 0,
    });
  }
}

// Auto-shoot
let autoShootTimer = 0;
function autoShoot() {
  if (player.bullets.length > 0) {
    player.bullets.forEach(b => shoot(b.angle, 7, '#4af'));
    player.bullets = [];
  } else {
    // Shoot in 4 directions always
    const dirs = [0, Math.PI/2, Math.PI, Math.PI*1.5];
    dirs.forEach(a => shoot(a, 6, '#4af'));
  }
}

// Collision
function checkCollision(ax, ay, ar, bx, by, br) {
  return Math.hypot(ax - bx, ay - by) < ar + br;
}

// Init
function init() {
  player.x = cx;
  player.y = cy;
  player.power = 3;
  player.bullets = [];
  player.invTimer = 0;
  player.trail = [];
  bullets = [];
  particles = [];
  powerups = [];
  score = 0;
  wave = 1;
  tick = 0;
  spawnTimer = 0;
  autoShootTimer = 0;
  spawnInterval = 90;
  updateUI();
}

// Update
function update() {
  if (state !== 'playing') return;
  tick++;
  spawnTimer++;

  movePlayer();

  // Auto shoot
  autoShootTimer++;
  if (autoShootTimer > 30) {
    autoShootTimer = 0;
    autoShoot();
  }

  // Update bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    // Remove if off screen
    if (b.x < -50 || b.x > W + 50 || b.y < -50 || b.y > H + 50) {
      bullets.splice(i, 1);
      continue;
    }
    // Player hit by enemy bullet
    if (!b.fromPlayer && player.invTimer <= 0 && checkCollision(player.x, player.y, player.size, b.x, b.y, b.size)) {
      burst(b.x, b.y, '#f44', 8);
      bullets.splice(i, 1);
      player.power--;
      player.invTimer = 60;
      if (player.power <= 0) gameOver();
      continue;
    }
    // Player bullet hits enemy bullet
    if (b.fromPlayer) {
      for (let j = bullets.length - 1; j >= 0; j--) {
        const e = bullets[j];
        if (!e.fromPlayer && checkCollision(b.x, b.y, b.size, e.x, e.y, e.size)) {
          burst((b.x + e.x) / 2, (b.y + e.y) / 2, e.color, 5);
          burst(b.x, b.y, '#4af', 3);
          bullets.splice(i, 1);
          bullets.splice(j, 1);
          score += 5;
          break;
        }
      }
    }
  }

  // Spawn enemy bullets (grace period: first 90 frames = 1.5 seconds)
  const interval = Math.max(50, 90 - wave * 5);
  if (tick > 90 && spawnTimer >= interval) {
    spawnTimer = 0;
    spawnWave();
    if (tick % 300 === 0) wave++;
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.age++;
    if (checkCollision(player.x, player.y, player.size * 1.5, p.x, p.y, 16)) {
      applyPowerup(p.type);
      burst(p.x, p.y, '#fff', 10);
      powerups.splice(i, 1);
      continue;
    }
    if (p.age > 600) powerups.splice(i, 1);
  }

  if (player.invTimer > 0) player.invTimer--;
  score += 1;
  updateUI();
}

function applyPowerup(type) {
  if (type === 'heal') player.power = Math.min(player.power + 1, 5);
  if (type === 'power') {
    for (let i = 0; i < 8; i++) player.bullets.push({ angle: (Math.PI * 2 / 8) * i });
  }
  if (type === 'speed') player.invTimer = Math.max(player.invTimer, 120);
  if (type === 'multishot') {
    for (let i = 0; i < 4; i++) player.bullets.push({ angle: (Math.PI * 2 / 4) * i });
  }
}

function applyPowerup(type) {
  if (type === 'heal') player.power = Math.min(player.power + 1, 5);
  if (type === 'power') player.bullets.push({ angle: Math.random() * Math.PI * 2 });
  if (type === 'speed') player.invTimer = Math.max(player.invTimer, 120);
  if (type === 'multishot') {
    const angles = [0, Math.PI/2, Math.PI, Math.PI*1.5];
    angles.forEach(a => player.bullets.push({ angle: a }));
  }
}

// Draw
function draw() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);
  if (state === 'menu') return;
  if (state === 'gameover') return;

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Powerups
  powerups.forEach(p => {
    const emoji = p.type === 'heal' ? '❤' : p.type === 'power' ? '⚡' : p.type === 'speed' ? '💨' : '🔥';
    const pulse = 0.8 + Math.sin(p.age * 0.1) * 0.2;
    ctx.font = `${20 * pulse}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, p.x, p.y);
  });

  // Bullets
  bullets.forEach(b => {
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Player trail
  player.trail.forEach((t, i) => {
    const a = (i / player.trail.length) * 0.3;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(t.x, t.y, player.size * 0.5, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Player
  if (player.invTimer <= 0 || Math.floor(tick / 4) % 2 === 0) {
    const pulse = 1 + Math.sin(tick * 0.1) * 0.05;
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(
      player.x - player.size * pulse,
      player.y - player.size * pulse,
      player.size * 2 * pulse,
      player.size * 2 * pulse
    );
    ctx.shadowBlur = 0;

    // Health dots
    for (let i = 0; i < player.power; i++) {
      ctx.fillStyle = '#4f4';
      ctx.beginPath();
      ctx.arc(player.x - 8 + i * 8, player.y + player.size + 6, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function updateUI() {
  document.getElementById('scoreText').textContent = score;
  document.getElementById('levelText').textContent = `波次 ${wave}`;
}

// Game Over
function gameOver() {
  state = 'gameover';
  if (score > best) {
    best = score;
    localStorage.setItem('dodge-best', best);
  }
  document.getElementById('finalScore').textContent = score;
  document.getElementById('bestScore').textContent = best;
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('gameover').classList.remove('hidden');
}

// Loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Buttons
document.getElementById('startBtn').onclick = () => {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('gameover').classList.add('hidden');
  init();
  state = 'playing';
};
document.getElementById('retryBtn').onclick = () => {
  document.getElementById('gameover').classList.add('hidden');
  init();
  state = 'playing';
};

// Init
document.getElementById('bestScore').textContent = best;
loop();
</script>
</body>
</html>
