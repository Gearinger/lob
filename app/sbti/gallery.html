<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBTI 图鉴</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--card:#111116;--border:#2a2a35;--text:#E8E8F0;--sub:#555;--accent:#67e8f9}
body{background:var(--bg);font-family:'PingFang SC',serif;min-height:100vh;padding:0 20px 60px;color:var(--text)}
canvas#noise{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.05}
.header{text-align:center;padding:40px 20px 24px;position:relative;z-index:1}
.back{display:inline-block;margin-bottom:16px;color:rgba(212,197,169,.4);font-size:.85em;text-decoration:none;border:1px solid rgba(212,197,169,.2);padding:6px 16px;transition:all .2s}
.back:hover{border-color:rgba(139,105,20,.5);color:rgba(212,197,169,.7)}
.title{font-family:'Noto Serif SC',serif;font-size:clamp(2em,6vw,3.5em);font-weight:900;color:var(--ghost);letter-spacing:.1em;text-shadow:0 0 30px rgba(212,197,169,.3);transform:rotate(-0.5deg);display:inline-block;margin-bottom:8px}
.title::after{content:'';display:block;width:80%;height:1px;background:linear-gradient(90deg,transparent,#67e8f9,transparent);margin:10px auto 0}
.subtitle{font-size:.85em;color:rgba(212,197,169,.45);letter-spacing:.05em;line-height:1.7}
.count-badge{display:inline-block;background:rgba(103,232,249,.15);border:1px solid rgba(103,232,249,.3);padding:6px 18px;font-size:.8em;letter-spacing:.1em;margin-top:12px;color:#E8E8F0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;max-width:1100px;margin:0 auto;position:relative;z-index:1;padding:20px 0}
.type-card{background:linear-gradient(135deg,rgba(17,17,22,.9),rgba(10,10,18,.95));border:1px solid rgba(103,232,249,.15);padding:20px 18px;position:relative;transition:all .25s;cursor:default}
.type-card:nth-child(3n+1){transform:rotate(-0.3deg)}
.type-card:nth-child(3n+2){transform:rotate(0.2deg)}
.type-card:nth-child(3n+3){transform:rotate(-0.1deg)}
.type-card:hover{transform:rotate(0deg) translateY(-4px);box-shadow:0 8px 30px rgba(103,232,249,.1);border-color:rgba(103,232,249,.4)}
.type-card::before{content:'';position:absolute;top:-1px;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,#67e8f9,transparent)}
.type-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.type-emoji{font-size:1.8em;filter:drop-shadow(0 0 6px rgba(212,197,169,.2))}
.type-name{font-family:'Noto Serif SC',serif;font-size:1.1em;font-weight:700;color:var(--ghost);letter-spacing:.05em}
.type-key{font-size:.68em;color:rgba(212,197,169,.3);letter-spacing:.08em;margin-left:auto;font-family:monospace;white-space:nowrap}
.type-desc{font-size:.78em;color:rgba(212,197,169,.55);line-height:1.7;letter-spacing:.02em}
.type-dim{font-size:.68em;color:rgba(139,105,20,.6);margin-top:8px;letter-spacing:.05em}
.corner{position:fixed;font-size:1.5em;opacity:.07;pointer-events:none;z-index:0;user-select:none}
.corner.tl{top:20px;left:15px}
.corner.br{bottom:20px;right:15px;transform:rotate(180deg)}
@media(max-width:600px){.grid{grid-template-columns:1fr 1fr;gap:12px}.type-card{padding:14px 12px}.type-name{font-size:.95em}}
</style>
</head>
<body>
<canvas id="noise"></canvas>
<div class="corner tl">👁</div>
<div class="corner br">🕯</div>

<div class="header">
  <a href="./" class="back">← 回到测试</a>
  <div class="title">SBTI 图鉴</div>
  <div class="subtitle">27 种离谱人格完全收录<br>看看你是哪一种</div>
  <div class="count-badge">27 种离谱人格</div>
</div>

<div class="grid" id="grid"></div>

<script>
const types=[
  ["CTRL","拿捏者","🐔","怎么样，被我拿捏了吧？你以为自己很聪明，其实在我眼里，你的一切行为都是可预测的脚本。","48.7%"],
  ["ATM-er","送钱者","💸","你以为我很有钱吗？信用卡已刷爆，花呗已逾期，但我请朋友吃饭从不眨眼。","25.0%"],
  ["Dior-s","屌丝","🧱","等着我屌丝逆袭。虽然现在穿着9块9的T恤，但总有一天我会逆袭的，到时候你们都给我等着。",""],
  ["BOSS","领导者","👑","方向盘给我，我来开。你的决策速度让周围人感到压力，但这就是你——永远知道自己要去哪。","26.3%"],
  ["THAN-K","感恩者","🙏","我感谢苍天！我感谢大地！你是朋友圈里最正能量那个，但有时候你觉得累，因为感恩也需要能量。",""],
  ["OH-NO","哦不人","😱","哦不！我怎么会是这个人格？！你的人生就是不断发现新低的连续剧，但你仍然相信明天会更好。",""],
  ["GOGO","行者","🚶","gogogo~出发咯。永远在计划，永远在出发，永远在路上。到了吗？没有。在路上了吗？也在。",""],
  ["SEXY","尤物","💋","您就是天生的尤物！走路带风，说话带电，朋友圈发的自拍每张都像杂志封面。",""],
  ["LOVE-R","多情者","💘","爱意太满，现实显得有点贫瘠。每次都是真爱，每次都全情投入，然后每次都遍体鳞伤。但你还是相信下一个会更好。",""],
  ["MUM","妈妈","🤱","或许...我可以叫你妈妈吗？你是朋友圈最操心的那个，每个人有事都第一个找你倾诉。",""],
  ["FAKE","伪人","🎭","已经，没有人类了。你戴着面具的时间太长了，以至于都快忘了自己本来长什么样。",""],
  ["OJBK","无所谓人","😐","我说随便，是真的随便。你是真的不在意，能躺着绝不坐着，能逃避的问题绝不面对。",""],
  ["MALO","吗喽","🐒","人生是个副本，而我只是一只吗喽。你嘴上说躺平，身体却在卷；嘴上说无所谓，成绩单出来你还是偷偷看了。",""],
  ["JOKER","小丑","🃏","原来我们都是小丑。你是朋友圈的气氛担当，有你在的地方就不会冷场。但夜深人静的时候，你的笑话是不是在掩饰什么？",""],
  ["WOC","握草人","🙀","卧槽，我怎么是这个人格？这个世界对你来说永远充满惊喜或者惊吓，情绪波动比心电图还剧烈。",""],
  ["THIN-K","思考者","🤔","已深度思考100s。一碗螺蛳粉你都能想到人生的意义。但有时候想太多也是一种病。",""],
  ["SHIT","愤世者","💩","这个世界，糟糕一坨。你看什么都不顺眼，骂天骂地骂空气。但愤世的前提是对世界还有期待。",""],
  ["ZZZZ","装死者","🛌","我没死，我只是在睡觉。能躺着绝不坐着，能不说话绝不开口，能逃避的问题绝不面对。",""],
  ["POOR","贫困者","🪙","我穷，但我很专。你是那种钱不多但花得明白的人，买东西精打细算，穷有穷的活法，你的烦恼最少。",""],
  ["MONK","僧人","🕉","没有那种世俗的欲望。你对物质的追求约等于零，世人忙忙碌碌，你只在乎今天吃什么和晚上几点睡。",""],
  ["IMSB","傻者","🤡","认真的么？我真的是傻逼么？明明做了很多正确的事，但还是会突然觉得自己是不是出了问题。别想了，你没问题。",""],
  ["SOLO","孤儿","😭","我哭了，我怎么会是孤儿？表面上你是一个人，但内心戏够一个剧场的。你是自由，不是孤独。",""],
  ["FUCK","草者","🌿","操！这是什么人格？嘴上说没关系，心里已经问候了对方全家。表面波澜不惊，内心已经是狂暴模式。",""],
  ["DEAD","死者","💀","我，还活着吗？肉体在运转但灵魂已下班。精神上你已经在马尔代夫晒太阳了。",""],
  ["IMFW","废物","🥀","我真的...是废物吗？明明已经很努力了，但你对自己永远比对外界苛刻。你的内在批判者24小时营业。",""],
  ["HHHH","傻乐者","😆","哈哈哈哈哈哈。你是朋友圈最快乐的那个。没什么能真正打击到你，开心也是一天，不开心也是一天。",""],
  ["DRUNK","酒鬼","🍺","烈酒烧喉，不得不醉。你不是爱喝酒，你是爱喝酒之后那个放飞的自己。清醒的时候是靠谱的大人，酒后才发现还有梦想。",""],
];

const grid = document.getElementById('grid');
grid.innerHTML = types.map(([key, emoji, name, desc, pct]) =>
  `<div class="type-card">
    <div class="type-header">
      <span class="type-emoji">${emoji}</span>
      <span class="type-name">${name}</span>
      <span class="type-key">${key}</span>
    </div>
    <div class="type-desc">${desc}</div>
    <div class="type-pct">${pct}</div>
  </div>`
).join('');

// Noise canvas
var c=document.getElementById('noise'),ctx=c.getContext('2d');
function rz(){c.width=window.innerWidth;c.height=window.innerHeight}
rz();window.addEventListener('resize',rz);
(function nd(){
  ctx.clearRect(0,0,c.width,c.height);
  for(var i=0;i<30;i++){
    var x=Math.random()*c.width,y=Math.random()*c.height,s=Math.random()*2+0.5;
    ctx.fillStyle='rgba(212,197,169,'+(Math.random()*0.03)+')';
    ctx.fillRect(x,y,s,s);
  }
  requestAnimationFrame(nd);
}());
</script>
</body>
</html>
