<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 性格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #111116;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            overflow: hidden;
        }
        
        .header {
            background: #111116;
            color: #E8E8F0;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .progress-bar {
            height: 4px;
            background: #eee;
        }
        
        .progress {
            height: 100%;
            background: linear-gradient(90deg, #67e8f9, #67e8f9);
            transition: width 0.3s ease;
        }
        
        .content {
            padding: 30px;
        }
        
        .question {
            display: none;
        }
        
        .question.active {
            display: block;
        }
        
        .question-number {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .question-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option {
            padding: 15px 20px;
            border: 2px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
            color: #555;
        }
        
        .option:hover {
            border-color: #667eea;
            background: #f8f6ff;
        }
        
        .option.selected {
            border-color: #667eea;
            background: #111116;
            color: white;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.02);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .result.active {
            display: block;
        }
        
        .mbti-type {
            font-size: 72px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }
        
        .type-name {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .type-desc {
            color: #666;
            line-height: 1.8;
            text-align: left;
            margin: 20px 0;
            padding: 20px;
            background: #f8f6ff;
            border-radius: 12px;
            white-space: pre-line;
        }
        
        .dimension-scores {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .dimension {
            text-align: center;
        }
        
        .dimension-label {
            font-size: 14px;
            color: #888;
            margin-bottom: 5px;
        }
        
        .dimension-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
        
        .share-btn {
            background: #333;
            margin: 10px;
        }
        
        .intro {
            text-align: center;
            padding: 40px 20px;
        }
        
        .intro p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.8;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .header {
                padding: 30px 20px;
            }
            .header h1 {
                font-size: 24px;
            }
            .content {
                padding: 20px;
            }
            .question-text {
                font-size: 16px;
            }
            .mbti-type {
                font-size: 56px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MBTI 性格测试</h1>

                <p>本测试共 <strong>60</strong> 道题目，预计用时 <strong>5-10</strong> 分钟。</p>

            <!-- 题目区域 -->

            <!-- 结果页 -->

                <div class="mbti-type" id="mbtiType"></div>
                <div class="dimension-scores" id="dimensionScores"></div>
                <div class="type-desc" id="typeDesc"></div>
                <button class="btn" onclick="shareResult()">分享结果</button>
                <button class="btn share-btn" onclick="restartTest()">重新测试</button>
            </div>
        </div>
    </div>

        let currentQuestion = 0;
        let answers = [];
        
        function startTest() {
            document.getElementById('intro').style.display = 'none';
            showQuestion();
        }
        
        function showQuestion() {
            const questionsDiv = document.getElementById('questions');
            questionsDiv.innerHTML = '';
            
            const q = questions[currentQuestion];
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question active';
            
            let optionsHTML = q.options.map((opt, i) => 
                `<div class="option" onclick="selectOption(${i})">${opt}</div>`
            ).join('');
            
            questionDiv.innerHTML = `
                <div class="question-number">问题 ${currentQuestion + 1} / ${questions.length}</div>
                <div class="question-text">${q.text}</div>
                <div class="options">${optionsHTML}</div>
                <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>下一题</button>
            `;
            
            questionsDiv.appendChild(questionDiv);
            updateProgress();
        }
        
        function selectOption(index) {
            answers[currentQuestion] = index;
            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.classList.toggle('selected', i === index);
            });
            document.getElementById('nextBtn').disabled = false;
        }
        
        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                showResult();
            }
        }
        
        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
        }
        
        function calculateResult() {
            let scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
            
            questions.forEach((q, i) => {
                if (answers[i] === 0) {
                    if (q.dimension === "EI") scores.EI++;
                    if (q.dimension === "SN") scores.SN++;
                    if (q.dimension === "TF") scores.TF++;
                    if (q.dimension === "JP") scores.JP++;
                } else {
                    if (q.dimension === "EI") scores.EI--;
                    if (q.dimension === "SN") scores.SN--;
                    if (q.dimension === "TF") scores.TF--;
                    if (q.dimension === "JP") scores.JP--;
                }
            });
            
            let mbti = "";
            mbti += scores.EI > 0 ? "E" : "I";
            mbti += scores.SN > 0 ? "S" : "N";
            mbti += scores.TF > 0 ? "T" : "F";
            mbti += scores.JP > 0 ? "J" : "P";
            
            return { mbti, scores };
        }
        
        function showResult() {
            const { mbti, scores } = calculateResult();
            const typeInfo = typeDescriptions[mbti];
            
            document.getElementById('questions').style.display = 'none';
            document.getElementById('result').classList.add('active');
            document.getElementById('progress').style.width = '100%';
            
            document.getElementById('mbtiType').textContent = mbti;
            document.getElementById('typeName').textContent = typeInfo.name;
            document.getElementById('typeDesc').textContent = typeInfo.desc;
            
            const dimensions = [
                { label: "外向/内向", score: scores.EI, type: "EI" },
                { label: "感觉/直觉", score: scores.SN, type: "SN" },
                { label: "思考/情感", score: scores.TF, type: "TF" },
                { label: "判断/知觉", score: scores.JP, type: "JP" }
            ];
            
            document.getElementById('dimensionScores').innerHTML = dimensions.map(d => {
                const sign = d.score > 0 ? (d.type === "EI" ? "E" : d.type === "SN" ? "S" : d.type === "TF" ? "T" : "J") : 
                                 (d.type === "EI" ? "I" : d.type === "SN" ? "N" : d.type === "TF" ? "F" : "P");
                return `
                    <div class="dimension">
                        <div class="dimension-label">${d.label}</div>
                        <div class="dimension-value">${sign} (${Math.abs(d.score)})</div>
                    </div>
                `;
            }).join('');
        }
        
        function shareResult() {
            const mbti = document.getElementById('mbtiType').textContent;
            const typeName = document.getElementById('typeName').textContent;
            const text = `我的MBTI性格类型是 ${mbti}（${typeName}），快来测试你的吧！`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'MBTI 性格测试',
                    text: text,
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(text + ' ' + window.location.href);
                alert('结果已复制到剪贴板！');
            }
        }
        
        function restartTest() {
            currentQuestion = 0;
            answers = [];
            document.getElementById('questions').style.display = 'block';
            document.getElementById('result').classList.remove('active');
            document.getElementById('progress').style.width = '0%';
            showQuestion();
        }
