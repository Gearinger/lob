<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玄学骰子 🎲</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;font-family:'PingFang SC',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;color:#E8E8F0}
.card{background:#111116;border:1px solid #2a2a35;border-radius:16px;padding:40px 32px;text-align:center;position:relative;max-width:420px;width:100%}
.back{position:absolute;top:16px;left:20px;color:#555;font-size:.85em;text-decoration:none}
.title{font-size:2em;letter-spacing:3px;margin-bottom:8px}
.decorative{width:60px;height:3px;background:#67e8f9;border-radius:2px;margin:0 auto 20px}
.question-box{margin-bottom:20px}
.question-input{border:1px solid #2a2a35;border-radius:10px;padding:10px 14px;font-family:inherit;font-size:.95em;width:100%;background:#111116;color:#E8E8F0;outline:none;transition:border-color .2s}
.question-input:focus{border-color:#67e8f9}
.dice-area{min-height:140px;display:flex;align-items:center;justify-content:center;margin:20px 0}
.dice{font-size:6em;cursor:pointer;transition:transform .1s;user-select:none}
.dice.rolling{animation:shake .1s linear infinite}
@keyframes shake{0%{transform:rotate(0)}25%{transform:rotate(-15deg)}75%{transform:rotate(15deg)}}
.result{font-size:1.5em;letter-spacing:2px;color:#E8E8F0;line-height:1.8;margin-top:12px;text-align:center}
.btn{background:#1a1a25;color:#67e8f9;border:1px solid #67e8f9;border-radius:12px;padding:12px 28px;font-size:1.1em;letter-spacing:2px;cursor:pointer;transition:all .2s;margin-top:16px}
.notice{font-size:.78em;color:#aaa;margin-top:16px;font-style:italic}
</style>
</head>
<body>
<div class="card">
  <a href="../" class="back">← 玄学实验室</a>
  <div class="title">玄学骰子</div>
  <div class="decorative"></div>
  <p style="font-size:.9em;color:#555;line-height:1.7">心中默念你的问题<br>点击骰子，让命运来决定</p>
  <div class="question-box">
    <input class="question-input" id="q" placeholder="你的问题是什么？">
  </div>
  <div class="dice-area">
    <div class="dice" id="dice" onclick="rollDice()">🎲</div>
  </div>
  <div class="result" id="result" style="display:none"></div>
  <button class="btn" onclick="rollDice()">摇一摇 🔮</button>
  <div class="notice">掷地有声，命运自有安排 🎲</div>
</div>

<script>
const answers=[
  '这个问题，答案是不行。',
  '有点悬，建议再观望观望。',
  '有戏！可以试一试！',
  '成功率五五开，要靠自己争取。',
  '玄学告诉你：希望很大！',
  '别急，时机未到，等等看。',
  '这事儿成了！挡都挡不住！',
  '不建议，风险太大。',
  '看起来不错，值得一试。',
  '平平无奇，顺其自然就好。',
  '机会很大，大胆去做！',
  '建议你换个思路。'
];

function hash(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return Math.abs(h);}

function rollDice(){
  const q=document.getElementByIdd('q').value.trim()||'default';
  const seed=hash(q+Date.now());
  const dice=document.getElementByIdd('dice');
  const result=document.getElementByIdd('result');

  dice.classList.add('rolling');
  result.style.display='none';

  let spins=0;
  const spinInterval=setInterval(()=>{
    dice.textContent=['⚀','⚁','⚂','⚃','⚄','⚅'][Math.floor(Math.random()*6)];
    spins++;
    if(spins>15){
      clearInterval(spinInterval);
      dice.classList.remove('rolling');
      const idx=seed%answers.length;
      result.textContent=answers[idx];
      result.style.display='block';
    }
  },80);
}
</script>
</body>
</html>
