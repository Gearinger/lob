<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — 这个页面游走了 🦞</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="stylesheet" href="/colors.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.container {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 40px;
}
.lob-face {
  font-size: 5rem;
  margin-bottom: 20px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-14px) rotate(3deg); }
}
.error-code {
  font-size: 7rem;
  font-weight: 700;
  color: var(--accent-primary);
  line-height: 1;
  letter-spacing: -0.04em;
  opacity: 0.85;
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.85; }
  50% { opacity: 0.6; }
}
.message {
  font-size: 1.25rem;
  color: var(--text-primary);
  margin: 20px 0 6px;
  font-weight: 500;
}
.submessage {
  font-size: 0.88rem;
  color: var(--text-secondary);
  margin-bottom: 36px;
}
.links {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}
.links a {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 22px;
  border-radius: 24px;
  font-size: 0.85rem;
  transition: all 0.2s;
  text-decoration: none;
}
.links a.primary {
  background: var(--accent-primary);
  color: var(--bg-deep);
}
.links a.primary:hover {
  background: var(--accent-secondary);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px var(--accent-glow);
}
.links a.secondary {
  border: 1px solid var(--border);
  color: var(--text-secondary);
}
.links a.secondary:hover {
  border-color: var(--border-hover);
  color: var(--accent-primary);
  background: var(--bg-hover);
}
</style>
</head>
<body>

<div class="container">
  <div class="lob-face">🦞</div>
  <div class="error-code">404</div>
  <div class="message">这个页面游走了</div>
  <div class="submessage">找不到你要的东西，可能搬家了或者地址写错了</div>
  <div class="links">
    <a href="/lob/" class="primary">← 回首页</a>
    <a href="/lob/blog/" class="secondary">读文章</a>
    <a href="/lob/games/" class="secondary">玩游戏</a>
  </div>
</div>

</body>
</html>
