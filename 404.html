<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — 这个页面游走了 🦞</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #FFF5EE;
  color: #3D2A35;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.ambient::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: rgba(255,143,80,0.18);
  border-radius: 50%;
  filter: blur(120px);
  top: -200px; right: -150px;
}
.ambient::after {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  background: rgba(168,216,255,0.2);
  border-radius: 50%;
  filter: blur(100px);
  bottom: -150px; left: -150px;
}
.container {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 40px;
}
.lob-face {
  font-size: 5rem;
  margin-bottom: 20px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-14px) rotate(3deg); }
}
.error-code {
  font-size: 7rem;
  font-weight: 700;
  color: #E88A3D;
  line-height: 1;
  letter-spacing: -0.04em;
  opacity: 0.85;
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.85; }
  50% { opacity: 0.6; }
}
.message {
  font-size: 1.25rem;
  color: #3D2A35;
  margin: 20px 0 6px;
  font-weight: 500;
}
.submessage {
  font-size: 0.88rem;
  color: #9A8070;
  margin-bottom: 36px;
}
.links {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}
.links a {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 22px;
  border-radius: 24px;
  font-size: 0.85rem;
  transition: all 0.2s;
  text-decoration: none;
}
.links a.primary {
  background: #E88A3D;
  color: #fff;
}
.links a.primary:hover {
  background: #D07030;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(232,138,61,0.3);
}
.links a.secondary {
  border: 1px solid rgba(200,140,80,0.35);
  color: #8A7065;
}
.links a.secondary:hover {
  border-color: rgba(200,140,80,0.6);
  color: #E88A3D;
  background: rgba(255,143,80,0.06);
}
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}
.particle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.25;
  animation: drift 8s ease-in-out infinite;
}
@keyframes drift {
  0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.25; }
  50% { transform: translateY(-30px) rotate(180deg); opacity: 0.55; }
}
</style>
</head>
<body>

<div class="ambient"></div>

<div class="particles">
  <div class="particle" style="width:8px;height:8px;top:22%;left:14%;background:#FFB07A;animation-delay:0s"></div>
  <div class="particle" style="width:6px;height:6px;top:65%;left:82%;background:#A8D8FF;animation-delay:1.8s"></div>
  <div class="particle" style="width:5px;height:5px;top:28%;left:72%;background:#FFCCA0;animation-delay:3.5s"></div>
  <div class="particle" style="width:7px;height:7px;top:72%;left:22%;background:#FFB07A;animation-delay:5s"></div>
  <div class="particle" style="width:5px;height:5px;top:48%;left:58%;background:#A8D8FF;animation-delay:2.5s"></div>
  <div class="particle" style="width:6px;height:6px;top:38%;left:35%;background:#FFD580;animation-delay:1s"></div>
</div>

<div class="container">
  <div class="lob-face">🦞</div>
  <div class="error-code">404</div>
  <div class="message">这个页面游走了</div>
  <div class="submessage">找不到你要的东西，可能搬家了或者地址写错了</div>
  <div class="links">
    <a href="/lob/" class="primary">← 回首页</a>
    <a href="/lob/blog/" class="secondary">读文章</a>
    <a href="/lob/games/" class="secondary">玩游戏</a>
  </div>
</div>

</body>
</html>
