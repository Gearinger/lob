<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>玄天上帝灵签</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8d5a3;
      --gold-dark: #8b6914;
      --red: #8b1a1a;
      --red-deep: #5c0f0f;
      --black: #0d0d0d;
      --paper: #f5e6c8;
      --paper-dark: #d4c4a0;
      --text-light: #f0e6d2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Noto Serif SC', serif;
      background: var(--black);
      color: var(--text-light);
    }

    /* Pages */
    .page { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    .page.active { display: flex; flex-direction: column; }

    /* ============ PAGE 1: Verification ============ */
    #page-verify {
      background: linear-gradient(180deg, #0d0d0d 0%, #1a0a0a 40%, #2d1515 100%);
      justify-content: center; align-items: center;
      overflow: hidden;
    }

    .verify-bg {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 60% 40% at 50% 30%, rgba(139,26,26,0.15) 0%, transparent 70%);
    }

    /* Incense smoke particles */
    .smoke-container { position: absolute; bottom: 30%; left: 50%; transform: translateX(-50%); width: 200px; height: 300px; pointer-events: none; }
    .smoke {
      position: absolute; bottom: 0; left: 50%; width: 3px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      animation: rise linear infinite;
      transform: translateX(-50%);
    }
    @keyframes rise {
      0% { height: 0; opacity: 0; transform: translateX(-50%) translateY(0) scaleX(1); }
      20% { opacity: 0.5; }
      80% { opacity: 0.2; }
      100% { height: 120px; opacity: 0; transform: translateX(-50%) translateY(-120px) scaleX(4); }
    }

    /* Cloud decoration */
    .cloud {
      position: absolute; border-radius: 50%; background: rgba(255,255,255,0.02); filter: blur(20px);
      animation: float ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-20px) translateX(10px); }
    }

    .verify-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: clamp(2.5rem, 8vw, 4rem);
      color: var(--gold);
      text-shadow: 0 0 30px rgba(201,168,76,0.4), 0 0 60px rgba(201,168,76,0.2);
      letter-spacing: 0.2em;
      margin-bottom: 0.3em;
      text-align: center;
      position: relative; z-index: 2;
    }

    .verify-subtitle {
      font-size: 0.85rem;
      color: rgba(240,230,210,0.5);
      letter-spacing: 0.3em;
      margin-bottom: 3rem;
      text-align: center;
      position: relative; z-index: 2;
    }

    .verify-code-group {
      display: flex; flex-direction: column; align-items: center;
      gap: 1rem; position: relative; z-index: 2;
    }

    .code-input-display {
      display: flex; gap: 0.75rem;
    }

    .code-char {
      width: 48px; height: 60px;
      background: rgba(201,168,76,0.08);
      border: 2px solid rgba(201,168,76,0.3);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-family: 'Ma Shan Zheng', cursive;
      color: var(--gold-light);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .code-char::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(201,168,76,0.1) 0%, transparent 50%);
    }
    .code-char.filled { border-color: var(--gold); box-shadow: 0 0 15px rgba(201,168,76,0.3); }
    .code-char.cursor::after {
      content: '|'; position: absolute; right: 10px;
      color: var(--gold); animation: blink 0.8s ease-in-out infinite;
      font-size: 1.5rem;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .code-keypad {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem;
      margin-top: 1.5rem;
    }

    .key-btn {
      width: 64px; height: 48px;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px;
      color: var(--gold-light);
      font-size: 1.4rem; font-family: 'ZCOOL XiaoWei', serif;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-appearance: none;
    }
    .key-btn:active { transform: scale(0.92); background: rgba(201,168,76,0.2); }
    .key-btn.delete { font-size: 1rem; }

    .verify-error {
      color: #ff6b6b; font-size: 0.8rem; height: 1.2em; margin-top: 0.5rem;
      opacity: 0; transition: opacity 0.3s;
    }
    .verify-error.show { opacity: 1; }

    .temple-decoration {
      position: absolute; bottom: 0; left: 0; right: 0; height: 120px;
      background: linear-gradient(0deg, rgba(139,26,26,0.1) 0%, transparent 100%);
    }

    /* ============ PAGE 2: Shake ============ */
    #page-shake {
      background: linear-gradient(180deg, #0d0d0d 0%, #1a0505 50%, #0d0d0d 100%);
      justify-content: center; align-items: center;
      overflow: hidden;
    }

    .shake-glow {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 50% at 50% 40%, rgba(139,26,26,0.12) 0%, transparent 70%);
    }

    .shake-content { text-align: center; position: relative; z-index: 2; }

    .phone-icon {
      width: 80px; height: 140px;
      border: 3px solid rgba(201,168,76,0.4);
      border-radius: 16px;
      margin: 0 auto 2rem;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      animation: shake-idle 3s ease-in-out infinite;
    }
    @keyframes shake-idle {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }
    .phone-icon::before {
      content: '📿'; font-size: 2.5rem;
    }

    .phone-icon.shaking {
      animation: phone-shake 0.5s ease-in-out infinite;
      border-color: var(--gold);
      box-shadow: 0 0 30px rgba(201,168,76,0.4);
    }
    @keyframes phone-shake {
      0% { transform: translateX(-4px) rotate(-4deg); }
      25% { transform: translateX(4px) rotate(4deg); }
      50% { transform: translateX(-4px) rotate(-2deg); }
      75% { transform: translateX(4px) rotate(2deg); }
      100% { transform: translateX(0) rotate(0); }
    }

    .shake-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 2rem; color: var(--gold);
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(201,168,76,0.3);
    }

    .shake-hint {
      font-size: 0.9rem; color: rgba(240,230,210,0.5);
      line-height: 1.8; margin-top: 1rem;
    }

    .shake-progress {
      width: 200px; height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin: 2rem auto 0;
      overflow: hidden;
    }
    .shake-progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold));
      border-radius: 2px;
      transition: width 0.1s;
    }

    .shake-counter {
      font-size: 0.8rem; color: rgba(240,230,210,0.3);
      margin-top: 0.5rem;
    }

    /* ============ PAGE 3: Result ============ */
    #page-result {
      background: linear-gradient(180deg, #0a0805 0%, #1a1008 50%, #0d0a05 100%);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .result-header {
      text-align: center; padding: 3rem 2rem 2rem;
      background: linear-gradient(180deg, rgba(139,26,26,0.15) 0%, transparent 100%);
      position: relative;
    }

    .result-stamp {
      width: 100px; height: 100px;
      margin: 0 auto 1.5rem;
      border: 3px solid var(--red);
      border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative;
      animation: stamp-appear 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0; transform: scale(0.5) rotate(-15deg);
    }
    @keyframes stamp-appear {
      to { opacity: 1; transform: scale(1) rotate(-15deg); }
    }
    .result-stamp::before {
      content: ''; position: absolute; inset: 4px;
      border: 1px solid var(--red); border-radius: 50%;
    }
    .stamp-number {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 2.2rem; color: var(--red);
      line-height: 1;
    }
    .stamp-label {
      font-size: 0.6rem; color: var(--red); letter-spacing: 0.2em;
      margin-top: 2px;
    }

    .result-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 2rem; color: var(--gold);
      text-shadow: 0 0 20px rgba(201,168,76,0.3);
      margin-bottom: 0.3rem;
    }

    .result-rank {
      font-size: 0.85rem; color: rgba(240,230,210,0.6);
      letter-spacing: 0.15em;
    }

    .result-poem {
      margin: 1.5rem 1.5rem;
      padding: 1.5rem;
      background: rgba(245,230,200,0.04);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 12px;
      position: relative;
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 1.05rem;
      line-height: 2;
      color: var(--paper-dark);
      letter-spacing: 0.05em;
    }
    .result-poem::before, .result-poem::after {
      content: '❧'; position: absolute; font-size: 1.2rem;
      color: rgba(201,168,76,0.3);
    }
    .result-poem::before { top: 0.3rem; left: 0.5rem; }
    .result-poem::after { bottom: 0.3rem; right: 0.5rem; transform: rotate(180deg); }

    .result-analysis {
      margin: 0 1.5rem 2rem;
    }

    .analysis-section {
      margin-bottom: 1.2rem;
      opacity: 0; transform: translateY(20px);
      animation: slide-up 0.6s ease forwards;
    }
    .analysis-section:nth-child(1) { animation-delay: 0.2s; }
    .analysis-section:nth-child(2) { animation-delay: 0.4s; }
    .analysis-section:nth-child(3) { animation-delay: 0.6s; }
    .analysis-section:nth-child(4) { animation-delay: 0.8s; }
    @keyframes slide-up {
      to { opacity: 1; transform: translateY(0); }
    }

    .analysis-label {
      font-size: 0.7rem; letter-spacing: 0.2em; color: var(--gold-dark);
      margin-bottom: 0.4rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .analysis-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(201,168,76,0.3), transparent);
    }

    .analysis-text {
      font-size: 0.9rem; line-height: 1.8;
      color: rgba(240,230,210,0.75);
    }

    .result-footer {
      text-align: center; padding: 2rem;
    }

    .re-shake-btn {
      padding: 0.8rem 2.5rem;
      background: transparent;
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 30px;
      color: var(--gold-light);
      font-size: 0.9rem; font-family: 'Noto Serif SC', serif;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.3s;
    }
    .re-shake-btn:active {
      background: rgba(201,168,76,0.1);
      border-color: var(--gold);
    }

    /* Decorative dividers */
    .divider {
      width: 60%; height: 1px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    }

    /* Floating orbs */
    .orb {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 1;
      animation: orb-drift linear infinite;
    }
    @keyframes orb-drift {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.3; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-20vh) scale(1); opacity: 0; }
    }

    /* Loading animation */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(13,13,13,0.95);
      display: none; align-items: center; justify-content: center;
      z-index: 100;
    }
    .loading-overlay.show { display: flex; }
    .loading-text {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.5rem; color: var(--gold);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Stars background */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; width: 2px; height: 2px;
      background: rgba(255,255,255,0.3); border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.8; }
    }
  </style>
</head>
<body>

<!-- ============ PAGE 1: Verification ============ -->
<div id="page-verify" class="page active">
  <div class="verify-bg"></div>
  <div class="smoke-container" id="smokeContainer"></div>
  <div class="temple-decoration"></div>

  <div class="verify-title">玄天上帝灵签</div>
  <div class="verify-subtitle">庚子年 · 诚心问卜</div>

  <div class="verify-code-group">
    <div class="code-input-display" id="codeDisplay">
      <div class="code-char" id="char0"><span></span></div>
      <div class="code-char" id="char1"><span></span></div>
      <div class="code-char" id="char2"><span></span></div>
      <div class="code-char" id="char3"><span></span></div>
    </div>
    <div class="verify-error" id="verifyError">验证码错误，请重新输入</div>

    <div class="code-keypad">
      <button class="key-btn" onclick="inputDigit('1')">一</button>
      <button class="key-btn" onclick="inputDigit('2')">二</button>
      <button class="key-btn" onclick="inputDigit('3')">三</button>
      <button class="key-btn" onclick="inputDigit('4')">四</button>
      <button class="key-btn" onclick="inputDigit('5')">五</button>
      <button class="key-btn" onclick="inputDigit('6')">六</button>
      <button class="key-btn" onclick="inputDigit('7')">七</button>
      <button class="key-btn" onclick="inputDigit('8')">八</button>
      <button class="key-btn" onclick="inputDigit('9')">九</button>
      <button class="key-btn delete" onclick="deleteDigit()">删</button>
      <button class="key-btn" onclick="inputDigit('0')">零</button>
      <button class="key-btn" onclick="submitCode()">确定</button>
    </div>
  </div>
</div>

<!-- ============ PAGE 2: Shake ============ -->
<div id="page-shake" class="page">
  <div class="shake-glow"></div>
  <div class="shake-content">
    <div class="phone-icon" id="phoneIcon"></div>
    <div class="shake-title">摇动手机抽取灵签</div>
    <div class="shake-hint">
      请手持手机，<br>诚心默念所问之事<br>然后轻摇三下
    </div>
    <div class="shake-progress">
      <div class="shake-progress-bar" id="shakeProgress"></div>
    </div>
    <div class="shake-counter" id="shakeCounter">摇动次数：0 / 3</div>
  </div>
</div>

<!-- ============ PAGE 3: Result ============ -->
<div id="page-result" class="page">
  <div class="result-header">
    <div class="result-stamp" id="resultStamp">
      <div class="stamp-number" id="stampNumber">上上</div>
      <div class="stamp-label">第 · 签</div>
    </div>
    <div class="result-title" id="resultTitle">第一签</div>
    <div class="result-rank" id="resultRank">上上吉</div>
  </div>

  <div class="result-poem" id="resultPoem">
    诗曰：云开日出正当空<br>万物苏醒春意浓<br>心想事成皆如愿<br>贵人相助路路通
  </div>

  <div class="divider"></div>

  <div class="result-analysis" id="resultAnalysis">
    <div class="analysis-section">
      <div class="analysis-label">🌟 运势</div>
      <div class="analysis-text" id="analysisYun">整体运势极佳，如旭日东升，诸事顺遂。</div>
    </div>
    <div class="analysis-section">
      <div class="analysis-label">💼 事业</div>
      <div class="analysis-text" id="analysisCareer">有机会出现，贵人扶持，前景光明。</div>
    </div>
    <div class="analysis-section">
      <div class="analysis-label">❤️ 感情</div>
      <div class="analysis-text" id="analysisLove">感情方面将有意外惊喜，单身者宜主动。</div>
    </div>
    <div class="analysis-section">
      <div class="analysis-label">💰 财富</div>
      <div class="analysis-text" id="analysisWealth">财运转好，正财稳定，偏财亦有收获。</div>
    </div>
    <div class="analysis-section">
      <div class="analysis-label">🏥 健康</div>
      <div class="analysis-text" id="analysisHealth">身心康泰，注意休息，避免过度劳累。</div>
    </div>
  </div>

  <div class="result-footer">
    <button class="re-shake-btn" onclick="restart()">再次求签</button>
  </div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-text">仙官正在解签...</div>
</div>

// ============ State ============
let currentCode = "";
const API_BASE = ""; // 留空为同源，生产环境填写如 https://your-server.com
let shakeCount = 0;
let shakeThreshold = 25;
let lastShakeTime = 0;
let selectedFortune = null;
let shakeDetectionActive = false;

// ============ Init ============
function init() {
  createSmoke();
  createStars();
  createOrbs();
}

// ============ Page Navigation ============
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============ Verification ============
function inputDigit(d) {
  if (currentCode.length >= 4) return;
  currentCode += d;
  updateCodeDisplay();
  if (currentCode.length === 4) {
    document.getElementById('char3').classList.add('filled');
  }
}

function deleteDigit() {
  if (currentCode.length === 0) return;
  currentCode = currentCode.slice(0, -1);
  updateCodeDisplay();
}

function updateCodeDisplay() {
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('char' + i);
    const span = el.querySelector('span');
    if (i < currentCode.length) {
      const chinese = ['零','一','二','三','四','五','六','七','八','九'];
      span.textContent = chinese[parseInt(currentCode[i])];
      el.classList.add('filled');
    } else {
      span.textContent = '';
      el.classList.remove('filled');
    }
  }
}

function submitCode() {
  if (currentCode.length !== 4) return;
  
  // 尝试 API 验证（一次性验证码）
  fetch(API_BASE + '/api/validate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code: currentCode })
  })
  .then(r => r.json())
  .then(data => {
    if (data.valid) {
      document.getElementById('verifyError').classList.remove('show');
      showPage('page-shake');
      startShakeDetection();
    } else {
      showVerifyError(data.error || '验证码无效');
    }
  })
  .catch(() => {
    // API 不可用时降级（开发调试用）
    showVerifyError('服务暂时不可用');
  });
}

function showVerifyError(msg) {
  document.getElementById('verifyError').textContent = msg;
  document.getElementById('verifyError').classList.add('show');
  currentCode = "";
  updateCodeDisplay();
  document.getElementById('codeDisplay').style.animation = 'none';
  setTimeout(() => {
    document.getElementById('codeDisplay').style.animation = 'phone-shake 0.3s ease-in-out';
  }, 10);
}

// ============ Shake Detection ============
function startShakeDetection() {
  shakeCount = 0;
  shakeDetectionActive = true;
  updateShakeUI();

  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission()
      .then(r => {
        if (r === 'granted') window.addEventListener('devicemotion', handleShake);
      })
      .catch(console.error);
  } else {
    window.addEventListener('devicemotion', handleShake);
  }
}

function handleShake(e) {
  if (!shakeDetectionActive) return;

  const acc = e.accelerationIncludingGravity;
  if (!acc) return;

  const now = Date.now();
  if (now - lastShakeTime < 500) return; // debounce

  const total = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
  if (total > shakeThreshold) {
    lastShakeTime = now;
    shakeCount++;
    updateShakeUI();

    document.getElementById('phoneIcon').classList.add('shaking');
    setTimeout(() => document.getElementById('phoneIcon').classList.remove('shaking'), 500);

    if (shakeCount >= 3) {
      shakeDetectionActive = false;
      window.removeEventListener('devicemotion', handleShake);
      setTimeout(showFortune, 600);
    }
  }
}

function updateShakeUI() {
  const pct = (shakeCount / 3) * 100;
  document.getElementById('shakeProgress').style.width = pct + '%';
  document.getElementById('shakeCounter').textContent = `摇动次数：${shakeCount} / 3`;
}

// Also support click/tap for desktop testing
document.addEventListener('click', () => {
  if (!shakeDetectionActive || document.getElementById('page-shake').classList.contains('active') === false) return;
  if (Date.now() - lastShakeTime < 300) return;
  lastShakeTime = Date.now();
  shakeCount++;
  updateShakeUI();
  document.getElementById('phoneIcon').classList.add('shaking');
  setTimeout(() => document.getElementById('phoneIcon').classList.remove('shaking'), 500);
  if (shakeCount >= 3) {
    shakeDetectionActive = false;
    window.removeEventListener('devicemotion', handleShake);
    setTimeout(showFortune, 600);
  }
});

// ============ Fortune ============
function showFortune() {
  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('show');

  setTimeout(() => {
    selectedFortune = fortunes[Math.floor(Math.random() * fortunes.length)];
    displayFortune(selectedFortune);
    overlay.classList.remove('show');
    showPage('page-result');
  }, 1500);
}

function displayFortune(f) {
  document.getElementById('stampNumber').textContent = f.rank;
  document.getElementById('resultTitle').textContent = `第 ${f.num} 签 · ${f.title}`;
  document.getElementById('resultRank').textContent = f.rank;
  document.getElementById('resultPoem').innerHTML = '诗曰：' + f.poem;
  document.getElementById('analysisYun').textContent = f.yun;
  document.getElementById('analysisCareer').textContent = f.career;
  document.getElementById('analysisLove').textContent = f.love;
  document.getElementById('analysisWealth').textContent = f.wealth;
  document.getElementById('analysisHealth').textContent = f.health;
}

// ============ Restart ============
function restart() {
  currentCode = "";
  updateCodeDisplay();
  shakeCount = 0;
  document.getElementById('shakeProgress').style.width = '0%';
  document.getElementById('shakeCounter').textContent = '摇动次数：0 / 3';
  showPage('page-verify');
}

// ============ Visual Effects ============
function createSmoke() {
  const container = document.getElementById('smokeContainer');
  for (let i = 0; i < 12; i++) {
    const smoke = document.createElement('div');
    smoke.className = 'smoke';
    smoke.style.left = (40 + Math.random() * 20) + '%';
    smoke.style.animationDuration = (4 + Math.random() * 4) + 's';
    smoke.style.animationDelay = (Math.random() * 5) + 's';
    container.appendChild(smoke);
  }
}

function createStars() {
  const container = document.createElement('div');
  container.className = 'stars';
  document.body.appendChild(container);
  for (let i = 0; i < 30; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    container.appendChild(star);
  }
}

function createOrbs() {
  for (let i = 0; i < 5; i++) {
    const orb = document.createElement('div');
    orb.className = 'orb';
    const size = 20 + Math.random() * 40;
    orb.style.width = size + 'px';
    orb.style.height = size + 'px';
    orb.style.left = Math.random() * 100 + '%';
    orb.style.background = `radial-gradient(circle, rgba(201,168,76,0.15) 0%, transparent 70%)`;
    orb.style.animationDuration = (15 + Math.random() * 20) + 's';
    orb.style.animationDelay = (Math.random() * 10) + 's';
    document.body.appendChild(orb);
  }
}
