<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBTI 离谱人格测试</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
:root{--ink:#2c2c2c;--paper:#fdf6e3;--pen-red:#e74c3c;--pen-blue:#3498db;--pen-green:#27ae60;--pen-yellow:#f39c12;--shadow:rgba(0,0,0,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e8e0d0;background-image:repeating-linear-gradient(0deg,transparent,transparent 28px,#d4c9b0 28px,#d4c9b0 29px);font-family:'ZCOOL KuaiLe','PingFang SC',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;color:var(--ink)}
.container{max-width:680px;width:100%;position:relative}
.card{background:var(--paper);border-radius:4px;padding:32px 28px;position:relative;box-shadow:4px 6px 0 var(--shadow);transform:rotate(-.3deg);transition:transform .3s}
.card:hover{transform:rotate(0) scale(1.01)}
.card::before{content:'';position:absolute;inset:8px;border:2px dashed #c9b99a;border-radius:4px;pointer-events:none}
.doodle-top{position:absolute;top:-15px;right:20px;font-size:28px;transform:rotate(12deg);filter:drop-shadow(2px 2px 0 rgba(0,0,0,.2));user-select:none}
.page{display:none;flex-direction:column;align-items:center;text-align:center}
.page.active{display:flex}
.title{font-family:'Ma Shan Zheng',cursive;font-size:3.2em;color:var(--ink);margin-bottom:8px;letter-spacing:4px;text-shadow:2px 2px 0 var(--shadow);position:relative}
.title::after{content:'~~';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);font-size:.5em;color:var(--pen-red)}
.subtitle{font-size:1.1em;color:#7a6a50;margin-bottom:24px;line-height:1.6}
.decorative-line{width:120px;height:3px;background:var(--pen-red);border-radius:2px;transform:rotate(-1deg);margin:12px 0 20px;position:relative}
.decorative-line::before,.decorative-line::after{content:'✿';position:absolute;top:-8px;font-size:14px;color:var(--pen-red)}
.decorative-line::before{left:-4px}
.decorative-line::after{right:-4px;transform:scaleX(-1)}
.type-count{background:var(--ink);color:var(--paper);padding:10px 24px;border-radius:20px;font-size:.95em;margin-bottom:28px;transform:rotate(.5deg)}
.btn{background:var(--paper);border:2.5px solid var(--ink);border-radius:12px;padding:14px 40px;font-family:inherit;font-size:1.15em;cursor:pointer;transition:all .2s;position:relative;box-shadow:3px 4px 0 var(--ink);margin:6px}
.btn:hover{transform:translate(-2px,-2px);box-shadow:5px 6px 0 var(--ink)}
.btn:active{transform:translate(2px,2px);box-shadow:1px 2px 0 var(--ink)}
.btn-primary{background:var(--pen-red);color:#fff;border-color:#c0392b;box-shadow:3px 4px 0 #c0392b}
.btn-primary:hover{box-shadow:5px 6px 0 #c0392b}
.btn-primary:active{box-shadow:1px 2px 0 #c0392b}
.intro-doodles{display:flex;gap:16px;margin:20px 0;font-size:2.5em;animation:wobble 3s ease-in-out infinite}
@keyframes wobble{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
.progress-wrap{display:flex;align-items:center;gap:12px;margin-bottom:24px;font-size:.9em;color:#7a6a50}
.progress-bar{flex:1;height:10px;background:#e0d5c0;border-radius:5px;overflow:hidden;border:1.5px solid #c9b99a;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pen-green),var(--pen-yellow));border-radius:5px;transition:width .4s;position:relative}
.progress-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:8px;background:rgba(255,255,255,.4);border-radius:0 5px 5px 0}
.question-card{background:var(--paper);border:2.5px solid var(--ink);border-radius:12px;padding:24px 20px;margin-bottom:20px;position:relative;box-shadow:3px 4px 0 var(--ink);animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.question-num{position:absolute;top:-14px;left:20px;background:var(--pen-yellow);color:var(--ink);padding:2px 14px;border-radius:10px;font-size:.85em;border:2px solid var(--ink);font-weight:bold;transform:rotate(-1deg)}
.question-text{font-size:1.08em;line-height:1.7;margin-top:6px;margin-bottom:16px}
.options{display:flex;flex-direction:column;gap:10px}
.option{display:flex;align-items:center;gap:10px;padding:12px 14px;border:2px solid #c9b99a;border-radius:10px;cursor:pointer;transition:all .15s;background:var(--paper);font-size:.95em;line-height:1.5;text-align:left}
.option:hover{border-color:var(--pen-blue);background:#f0f7ff;transform:translateX(4px)}
.option.selected{border-color:var(--pen-green);background:#eafff0;transform:translateX(4px)}
.option-letter{width:28px;height:28px;border-radius:50%;border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:.85em;flex-shrink:0;background:var(--paper);transition:all .15s}
.option.selected .option-letter{background:var(--pen-green);color:#fff;border-color:var(--pen-green)}
.nav-btns{display:flex;gap:12px;justify-content:center;margin-top:8px}
.btn-nav{padding:12px 32px;font-size:1em;border-radius:10px;border:2.5px solid var(--ink);background:var(--paper);font-family:inherit;cursor:pointer;box-shadow:3px 4px 0 var(--ink);transition:all .15s}
.btn-nav:hover{transform:translate(-2px,-2px);box-shadow:5px 6px 0 var(--ink)}
.btn-nav:active{transform:translate(2px,2px);box-shadow:1px 2px 0 var(--ink)}
.btn-nav.submit{background:var(--pen-green);color:#fff;border-color:#1e8449;box-shadow:3px 4px 0 #1e8449}
.btn-nav.submit:hover{box-shadow:5px 6px 0 #1e8449}
.btn-nav.submit:disabled{background:#bdc3c7;border-color:#95a5a6;box-shadow:2px 3px 0 #95a5a6;cursor:not-allowed;opacity:.7;transform:none}
.result-card{text-align:center;animation:resultIn .6s ease}
@keyframes resultIn{from{opacity:0;transform:scale(.9) rotate(-2deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.result-type-badge{display:inline-block;background:var(--pen-red);color:#fff;padding:6px 20px;border-radius:20px;font-size:.85em;margin-bottom:12px;transform:rotate(-2deg);border:2px solid var(--ink)}
.result-type{font-family:'Ma Shan Zheng',cursive;font-size:3.5em;color:var(--ink);margin:8px 0;letter-spacing:2px;text-shadow:3px 3px 0 var(--shadow);animation:typeIn .8s ease .2s both}
@keyframes typeIn{from{letter-spacing:20px;opacity:0}to{letter-spacing:2px;opacity:1}}
.result-desc{font-size:1em;line-height:1.8;color:#5a4a30;margin:16px 0;text-align:left;padding:16px;background:rgba(0,0,0,.03);border-radius:8px;border-left:4px solid var(--pen-blue)}
.result-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0}
.tag{padding:4px 14px;border-radius:12px;font-size:.82em;border:1.5px solid var(--ink);background:var(--paper);transform:rotate(var(--r,0))}
.result-doodle{font-size:3em;margin:16px 0;animation:wobble 2.5s ease-in-out infinite}
.score-detail{background:#f5f0e5;border-radius:8px;padding:14px 18px;margin:16px 0;border:1.5px dashed #c9b99a;text-align:left}
.score-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.9em;border-bottom:1px dashed #d4c9b0}
.score-row:last-child{border-bottom:none}
.bar-bg{width:100px;height:8px;background:#e0d5c0;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;border:1px solid #c9b99a}
.bar-fill{height:100%;border-radius:4px;transition:width .8s ease}
.corner-doodle{position:fixed;font-size:2em;opacity:.15;pointer-events:none;z-index:0;user-select:none}
.corner-doodle.tl{top:10px;left:10px;transform:rotate(-15deg)}
.corner-doodle.br{bottom:10px;right:10px;transform:rotate(15deg) scaleX(-1)}
.submit-notice{text-align:center;font-size:.85em;color:#7a6a50;margin-top:12px;padding:8px;background:#fff9e6;border-radius:8px;border:1.5px dashed var(--pen-yellow)}
@media(max-width:600px){.title{font-size:2.4em}.result-type{font-size:2.6em}.card{padding:20px 16px}.question-text{font-size:1em}}
</style>
</head>
<body>
<div class="corner-doodle tl">💀</div>
<div class="corner-doodle br">🌿</div>
<div class="container">
<div class="page active" id="page-home">
<div class="card" style="text-align:center;padding:40px 28px">
<div class="doodle-top">🎭</div>
<div class="intro-doodles"><span>🪑</span><span>🌱</span><span>💼</span><span>🛋️</span></div>
<h1 class="title">SBTI</h1>
<p class="subtitle">Silly Big Personality Test<br>测出你人格里最离谱的那个部分</p>
<div class="decorative-line"></div>
<div class="type-count">🎉 共有 27 种离谱人格</div>
<p style="color:#7a6a50;font-size:.9em;margin-bottom:20px;line-height:1.6">共 31 道题，认真你就输了<br>正经题和离谱题穿插着来，做完你就知道自己是什么物种</p>
<button class="btn btn-primary" id="btn-start">开始测试 →</button>
</div>
</div>
<div class="page" id="page-test">
<div class="card">
<div class="progress-wrap"><span id="q-num">1 / 31</span><div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0"></div></div></div>
<div class="question-card" id="question-card"><div class="question-num" id="q-badge">第 1 题</div><div class="question-text" id="q-text"></div><div class="options" id="q-options"></div></div>
<div class="nav-btns"><button class="btn-nav" id="btn-prev" style="display:none">← 上一题</button><button class="btn-nav" id="btn-next">下一题 →</button><button class="btn-nav submit" id="btn-submit" disabled>提交结果</button></div>
<div class="submit-notice" id="submit-notice" style="display:none">✅ 所有题目已答完！点击上方按钮查看你的离谱人格</div>
</div>
</div>
<div class="page" id="page-result">
<div class="card result-card">
<div class="doodle-top">🔮</div>
<div class="result-doodle" id="r-doodle">🤪</div>
<div class="result-type-badge">你的 SBTI 人格是</div>
<div class="result-type" id="r-type">加载中...</div>
<div class="result-desc" id="r-desc"></div>
<div class="result-tags" id="r-tags"></div>
<div class="score-detail" id="r-score"></div>
<div class="decorative-line"></div>
<div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
<button class="btn btn-primary" id="btn-restart">再测一次 🔄</button>
<button class="btn" id="btn-share">📤 分享测试</button>
</div>
</div>
</div>
</div>
<script>function initSBTI(){var x=new XMLHttpRequest;x.open('GET','app.min.js?v=7');x.onload=function(){if(x.status===200){eval(x.responseText);document.getElementById('btn-start').addEventListener('click',startTest);document.getElementById('btn-prev').addEventListener('click',prevQ);document.getElementById('btn-next').addEventListener('click',nextQ);document.getElementById('btn-submit').addEventListener('click',showResult);document.getElementById('btn-restart').addEventListener('click',restartTest);document.getElementById('btn-share').addEventListener('click',shareResult)}};x.send()};if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initSBTI)}else{initSBTI()}</script>
</body>
</html>
